<!DOCTYPE html>
<!--
  PrintCards.html — Print Layout Page
  =====================================
  Renders a print-ready grid of NPC stat cards for browser printing.
  Opened as a web app via doGet() in Code.js, or via the Print Selector modal.

  Expected data: cardsData — array of cardData objects (see getCardDataFromSheet()).
  Currently supports up to 4 cards in a hardcoded 3×3 grid:
    Row 1: Fronts for cards 1, 2, 3
    Row 2: Backs  for cards 1, 2, 3
    Row 3: Front for card 4 | Back for card 4 | (empty)

  NOTE: The grid is hardcoded. Cards beyond index 3 are silently dropped.
  See KNOWN ISSUES in README.md.
-->
<?
  function include(filename, cardData) {
    var t = HtmlService.createTemplateFromFile(filename);
    t.cardData = cardData;
    return t.evaluate().getContent();
  }
?>
<html>
  <head>
    <base target="_top">
    <style>
      /* Lock the page to Letter with no browser-added margins */
      @page {
        size: 8.5in 11in;
        margin: 0;
      }

      /*
       * Force body padding to 0 with !important because StatCard.html and
       * StatCardBack.html each inject "body { padding: 8px }" via their own
       * <style> blocks when included as partials, and those rules appear later
       * in the document so they would otherwise win the cascade.
       */
      body {
        margin: 0 !important;
        padding: 0 !important;
        background: white;
        /* Center the card grid horizontally on the page */
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      /* Fixed-size columns and rows — no auto-sizing, no fractions */
      .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 2.5in);
        grid-template-rows: repeat(3, 3.5in);
        gap: 0;
        padding: 0;
        margin: 0;
        grid-template-areas:
          "a b c"
          "d e f"
          "g h i";
      }

      /* Each cell is exactly one card face — hard-clipped, no overflow */
      .cell {
        width: 2.5in;
        height: 3.5in;
        box-sizing: border-box;
        overflow: hidden;
        padding: 0;
        margin: 0;
      }

      .a { grid-area: a; }
      .b { grid-area: b; }
      .c { grid-area: c; }
      .d { grid-area: d; }
      .e { grid-area: e; }
      .f { grid-area: f; }
      .g { grid-area: g; }
      .h { grid-area: h; }
      .i { grid-area: i; }

      @media print {
        body {
          background: white !important;
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-container">
      <!-- Card 1 Front (cell "a") -->
      <div class="cell a">
        <? if (cardsData[0]) { ?>
          <?!= include('StatCard', cardsData[0]) ?>
        <? } ?>
      </div>
      <!-- Card 2 Front (cell "b") -->
      <div class="cell b">
        <? if (cardsData[1]) { ?>
          <?!= include('StatCard', cardsData[1]) ?>
        <? } ?>
      </div>
      <!-- Card 3 Front (cell "c") -->
      <div class="cell c">
        <? if (cardsData[2]) { ?>
          <?!= include('StatCard', cardsData[2]) ?>
        <? } ?>
      </div>
      <!-- Card 1 Back (cell "d") -->
      <div class="cell d">
        <? if (cardsData[0]) { ?>
          <?!= include('StatCardBack', cardsData[0]) ?>
        <? } ?>
      </div>
      <!-- Card 2 Back (cell "e") -->
      <div class="cell e">
        <? if (cardsData[1]) { ?>
          <?!= include('StatCardBack', cardsData[1]) ?>
        <? } ?>
      </div>
      <!-- Card 3 Back (cell "f") -->
      <div class="cell f">
        <? if (cardsData[2]) { ?>
          <?!= include('StatCardBack', cardsData[2]) ?>
        <? } ?>
      </div>
      <!-- Card 4 Front (cell "g") -->
      <div class="cell g">
        <? if (cardsData[3]) { ?>
          <?!= include('StatCard', cardsData[3]) ?>
        <? } ?>
      </div>
      <!-- Card 4 Back (cell "h") -->
      <div class="cell h">
        <? if (cardsData[3]) { ?>
          <?!= include('StatCardBack', cardsData[3]) ?>
        <? } ?>
      </div>
      <!-- Cell "i" remains empty -->
      <div class="cell i"></div>
    </div>
  </body>
</html>
