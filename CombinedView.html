<!DOCTYPE html>
<!--
  CombinedView.html — Modal Preview (Front + Back Side by Side)
  ==============================================================
  Renders a side-by-side preview of one NPC's front and back card
  inside a modal dialog (600×450px). Used by openStatCardModal().

  Expected data: cardData object passed from openStatCardModal() in Code.js.
  See StatCard.html and StatCardBack.html for full data shape.
-->
<? function include(filename, cardData) {
     var t = HtmlService.createTemplateFromFile(filename);
     // Pass cardData into the partial
     t.cardData = cardData;  
     return t.evaluate().getContent();
   } 
?>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        background: #f8f8f8;
        margin: 0;
        padding: 8px;
      }
      .card-container {
        display: flex;
        gap: 16px;
        justify-content: center;
        align-items: flex-start;
        flex-wrap: wrap;
      }
    </style>

  </head>
  <body>
    <div class="card-container">
      <?!= include('StatCard', cardData) ?>
      <?!= include('StatCardBack', cardData) ?>
    </div>
  </body>
</html>
