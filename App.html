<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPQ NPC Builder</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --panel: #ffffff;
      --ink: #1a1d24;
      --muted: #5d6574;
      --line: #d7dce8;
      --primary: #0f5da8;
      --primary-strong: #094882;
      --success: #127f39;
      --warn: #b16f00;
      --danger: #ba1f33;
      --shadow: 0 10px 30px rgba(20, 31, 56, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --field-ch: 30ch;
      --space-1: 4px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 10px;
      --space-5: 12px;
      --space-6: 16px;
      --field-h: 32px;
      --field-line-h: 20.667px;
      --field-pad-y: 5px;
      --field-pad-x: 8px;
      --surface-soft: #fbfdff;
      --row-action-w: 68px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% -20%, #fdf7df 0%, #f3f4f8 35%, #eef2f8 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100vh;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(120deg, #ffffff 0%, #f7f9fd 55%, #fff9e9 100%);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    #status {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      max-width: 440px;
    }

    #status.ok { color: var(--success); }
    #status.warn { color: var(--warn); }
    #status.error { color: var(--danger); }

    .view {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .view.active { display: block; }

    .home-wrap {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .home-title {
      margin: 0;
      font-size: 18px;
    }

    .home-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .home-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .npc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .npc-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%);
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .npc-card:hover {
      transform: translateY(-2px);
      border-color: #7fa7d5;
      box-shadow: 0 8px 20px rgba(15, 93, 168, 0.12);
    }

    .npc-card h3 {
      margin: 0;
      font-size: 15px;
      color: #123761;
    }

    .npc-card p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .npc-card.new-card {
      border-style: dashed;
      border-color: #8cb2df;
      background: linear-gradient(120deg, #f5f9ff 0%, #ffffff 100%);
    }

    .npc-card.new-card h3 {
      color: #0f5da8;
    }

    .empty-note {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: #fbfcff;
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      min-height: 70vh;
    }

    .editor-toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      background: #ffffffee;
      backdrop-filter: blur(6px);
      padding: 8px 12px;
    }

    #editor-title {
      margin-right: auto;
      font-weight: 700;
      color: #1a3c66;
    }

    .editor-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: var(--space-4);
      align-items: start;
      padding: var(--space-4);
    }

    .editor-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }

    .preview-pane {
      position: sticky;
      top: 56px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      padding: var(--space-3);
    }

    .preview-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: #4f5d72;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .preview-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .preview-frame {
      width: 100%;
      border: 1px solid #d8dfea;
      border-radius: 8px;
      padding: 6px;
      background: #eef4ff;
      display: flex;
      justify-content: center;
    }

    .preview-label {
      margin: 0 0 6px;
      font-size: 11px;
      color: #5b6b81;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .card-preview {
      font-family: Arial, sans-serif;
      width: 2.5in;
      height: 3.5in;
      background: #fff;
      border-radius: 6px;
      padding: 6px;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .card-preview .name {
      font-size: 22px;
      font-weight: bold;
      width: 100%;
      text-align: left;
    }

    .card-preview .subtitle {
      font-size: 11px;
      font-style: italic;
      color: #555;
      width: 100%;
      text-align: left;
      margin-bottom: 4px;
      white-space: normal;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .card-preview .row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 2px;
    }

    .card-preview .unified-card {
      flex: 1;
      background: #f0f0f0;
      border-radius: 4px;
      padding: 4px;
      margin: 0 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: auto;
    }

    .card-preview .label {
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 1px;
      color: #111;
      text-transform: none;
      letter-spacing: 0;
    }

    .card-preview .value-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card-preview .primary-value {
      font-size: 18px;
      font-weight: bold;
    }

    /* Keep stat tiles stable while editing empty values without forcing larger cards. */
    .card-preview .primary-value:empty::before {
      content: "\00a0";
    }

    .card-preview .secondary-stack {
      display: flex;
      flex-direction: column;
      font-size: 10px;
      line-height: 1;
      text-align: left;
      min-width: 20px;
      justify-content: center;
    }

    .card-preview .block-title {
      width: 100%;
      text-align: left;
      font-weight: bold;
      margin: 4px 0 2px;
      font-size: 12px;
      border-bottom: 1px solid #ccc;
    }

    .card-preview .text-line {
      width: 100%;
      font-size: 10px;
      line-height: 1.2;
    }

    .card-preview .description-block {
      width: 100%;
      margin: 2px 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
    }

    .card-preview .description-block strong {
      font-weight: bold;
    }

    .card-preview .spells-line {
      position: relative;
    }

    .card-preview .spells-brackets {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: var(--space-4);
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .section h2 {
      margin: 0;
      font-size: 14px;
      color: #163b63;
      letter-spacing: 0.15px;
    }

    .section h3 {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      color: #4a5e78;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      border: 0;
      padding: 0;
    }
    .section h3 + .defense-subsection,
    .section h3 + .skills-subsection {
      margin-top: -2px;
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-stat { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: var(--space-3); }
    .identity-name-wrap { max-width: 30ch; }
    .identity-name-wrap > label {
      font-size: 10px;
      color: #304b6b;
      letter-spacing: 0.45px;
    }
    .identity-name-wrap > label > input[type="text"] {
      width: min(100%, 27ch);
      min-height: 36px;
      font-size: 18px;
      font-weight: 700;
      color: #173657;
      letter-spacing: 0.2px;
    }
    .identity-class-wrap { max-width: 100%; margin-top: var(--space-1); }
    .identity-size-race {
      max-width: 52ch;
      grid-template-columns: 132px minmax(0, 1fr) 92px;
      align-items: end;
    }
    .identity-size-race > label.identity-cr-field > .num-stepper {
      max-width: 92px;
    }
    .combat-core {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 120px));
      gap: var(--space-2);
      align-items: start;
      justify-content: start;
    }
    .combat-core > label {
      align-items: center;
    }
    .speed-variants {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 100%;
      width: max-content;
      padding-left: 0;
      border-left: 0;
    }
    .movement-kicker {
      margin: 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #627287;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .movement-list-head,
    .movement-row {
      display: grid;
      grid-template-columns: 132px 90px 56px;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .movement-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .movement-list-head > div:nth-child(2),
    .movement-list-head > div:nth-child(3) {
      text-align: center;
    }
    .movement-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .movement-row select,
    .movement-row .num-stepper {
      width: 100%;
      max-width: 100%;
    }
    .movement-row .num-stepper {
      max-width: 90px;
    }
    .movement-row .row-remove-btn {
      justify-self: center;
    }
    .movement-list + .section-add-row {
      margin-top: var(--space-2);
    }

    .repeat-row {
      border: 1px solid #e5ebf5;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      padding: var(--space-2);
    }

    .repeat-inline {
      display: grid;
      align-items: end;
      justify-content: stretch;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .flag-row {
      grid-template-columns: minmax(20ch, 1.7fr) minmax(14ch, 1fr) minmax(13ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .condition-row {
      grid-template-columns: minmax(20ch, 1.8fr) minmax(14ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .skill-row {
      grid-template-columns: minmax(18ch, 1.5fr) minmax(9ch, 0.75fr) minmax(12ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .skills-summary-core {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 120px));
      gap: var(--space-2);
      align-items: start;
      justify-content: start;
      width: max-content;
      max-width: 100%;
    }
    .skills-summary-core > label {
      min-width: 0;
      width: 100%;
      align-items: center;
      text-align: center;
    }
    .skills-summary-core .num-stepper {
      width: 100%;
      max-width: 120px;
    }
    .skills-summary-core .skills-signed-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-summary-core .skills-passive-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-vision-row {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: min(100%, 22ch);
    }
    .skills-vision-row > label {
      min-width: 0;
      width: 100%;
      max-width: 100%;
    }
    .skills-vision-row .skills-vision-input {
      width: 100%;
      max-width: 100%;
    }
    .skills-list-head,
    .skills-rule-row {
      display: grid;
      grid-template-columns: 170px 92px 114px 56px;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .skills-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .skills-list-head > div:nth-child(2),
    .skills-list-head > div:nth-child(4) {
      text-align: center;
    }
    .skills-rule-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .skills-rule-row select,
    .skills-rule-row .num-stepper {
      width: 100%;
      max-width: 100%;
    }
    .skills-rule-row .num-stepper {
      max-width: 92px;
    }
    .skills-rule-row .skills-mod-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-rule-row .row-remove-btn {
      justify-self: center;
    }
    .skills-list + .section-add-row {
      margin-top: var(--space-2);
    }
    .skills-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .skills-subsection > .section-add-row {
      margin-top: var(--space-2);
    }
    .spell-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .defense-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .defense-subsection > .section-add-row {
      margin-top: var(--space-2);
    }
    .defense-list-head,
    .damage-row,
    .condition-rule-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .damage-list-head,
    .damage-row {
      grid-template-columns: 154px 128px 128px 56px;
    }
    .condition-list-head,
    .condition-rule-row {
      grid-template-columns: 154px 128px 56px;
    }
    .defense-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .damage-list-head > div:last-child,
    .condition-list-head > div:last-child {
      text-align: center;
    }
    .damage-row,
    .condition-rule-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .damage-row select,
    .condition-rule-row select {
      width: 100%;
      max-width: 100%;
    }
    .damage-row .row-remove-btn,
    .condition-rule-row .row-remove-btn {
      justify-self: center;
    }

    .attr-matrix {
      border: 1px solid #dbe5f4;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #fff;
      width: max-content;
      max-width: 100%;
    }
    .attr-matrix-head,
    .attr-matrix-row {
      display: grid;
      grid-template-columns: 52px 90px 62px 90px 170px;
      gap: var(--space-2);
      align-items: center;
      padding: 5px 8px;
    }
    .attr-matrix-head {
      background: #f2f6fd;
      border-bottom: 1px solid #dbe5f4;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .attr-matrix-row {
      border-bottom: 1px solid #edf2fa;
    }
    .attr-matrix-row:nth-child(even) {
      background: #fbfdff;
    }
    .attr-matrix-row:last-child {
      border-bottom: 0;
    }
    .attr-matrix-head > div:nth-child(2),
    .attr-matrix-head > div:nth-child(3),
    .attr-matrix-head > div:nth-child(4),
    .attr-matrix-head > div:nth-child(5) {
      text-align: center;
    }
    .attr-stat-cell {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #1f3f63;
    }
    .attr-matrix-row .num-input,
    .attr-matrix-row input[type="text"],
    .attr-matrix-row select {
      width: auto;
    }
    .attr-matrix-row .num-input,
    .attr-matrix-row .attr-save-input { text-align: center; }
    .attr-matrix-row > div {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .attr-matrix-row > div:first-child {
      justify-content: flex-start;
    }
    .attr-matrix-row > div:nth-child(5) select {
      width: 16.8ch;
      max-width: 100%;
    }
    .attr-score-input,
    .attr-save-input {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.15px;
    }
    .attr-matrix-row .num-stepper {
      width: 100%;
      max-width: 90px;
      min-width: 0;
    }
    .attr-derived-text {
      color: #5a6778;
      font-weight: 600;
      width: 62px;
      min-width: 62px;
      max-width: 62px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.1px;
      line-height: 1.2;
    }
    .expand-row.is-hidden { display: none; }
    .section-add-row {
      margin-top: var(--space-1);
      display: flex;
      justify-content: flex-start;
    }

    .add-row-btn {
      min-height: 26px;
      padding: 0 9px;
      border-radius: 7px;
      font-size: 11px;
    }
    .action-row {
      margin-bottom: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .action-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--row-action-w);
      gap: var(--space-3);
      align-items: end;
    }
    .action-top {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: var(--space-3);
      align-items: end;
      margin: 0;
    }
    .action-simple-helper {
      margin: 0;
      font-size: 10px;
      line-height: 1.35;
      color: #627287;
    }
    .action-simple-head,
    .action-simple-row,
    .special-simple-head,
    .special-simple-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
      max-width: 100%;
    }
    .action-simple-head,
    .action-simple-row {
      grid-template-columns: 148px 122px 450px 122px 56px;
    }
    .special-simple-head,
    .special-simple-row {
      grid-template-columns: 64px 148px 122px 450px 122px 56px;
    }
    .action-simple-table {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: flex-start;
      max-width: 100%;
    }
    .action-simple-head,

      "proficiency bonus", "initiative", "passive perception", "vision"
    ];
    var STATS = ["strength", "dexterity", "constitution", "intelligence", "wisdom", "charisma"];
    var RICH_SIMPLE_KEYS = {};

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      document.getElementById("refresh-btn").addEventListener("click", loadNpcList);
      document.getElementById("create-btn").addEventListener("click", createNewNpc);
      document.getElementById("search-input").addEventListener("input", onSearchChanged);
      document.getElementById("back-btn").addEventListener("click", backToLibrary);
      document.getElementById("save-btn").addEventListener("click", saveNpc);
      document.getElementById("print-btn").addEventListener("click", printCurrentNpc);
      window.addEventListener("beforeunload", function(e) {
        if (!state.dirty) return;
        e.preventDefault();
        e.returnValue = "";
      });
      loadNpcList();
    }

    function setStatus(message, tone) {
      var el = document.getElementById("status");
      el.textContent = message;
      el.className = tone || "";
    }

    function setDirty(flag) {
      state.dirty = !!flag;
      if (!state.currentSheetName) return;
      if (state.dirty) {
        setStatus("Unsaved changes: " + state.currentSheetName, "warn");
      } else {
        setStatus("Loaded: " + state.currentSheetName, "ok");
      }
    }

    function showView(viewId) {
      document.getElementById("home-view").classList.remove("active");
      document.getElementById("editor-view").classList.remove("active");
      document.getElementById(viewId).classList.add("active");
    }

    function loadNpcList() {
      setStatus("Loading NPC list...", "");
      google.script.run
        .withSuccessHandler(function(names) {
          state.npcNames = names || [];
          state.filteredNames = state.npcNames.slice();
          renderNpcGrid();
          setStatus("Loaded " + state.npcNames.length + " NPC tabs.", "ok");
        })
        .withFailureHandler(function(err) {
          setStatus("Failed to load list: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getSheetNames();
    }

    function onSearchChanged() {
      var q = document.getElementById("search-input").value.toLowerCase().trim();
      if (!q) {
        state.filteredNames = state.npcNames.slice();
      } else {
        state.filteredNames = state.npcNames.filter(function(name) {
          return name.toLowerCase().indexOf(q) !== -1;
        });
      }
      renderNpcGrid();
    }

    function renderNpcGrid() {
      var grid = document.getElementById("npc-grid");
      grid.innerHTML = "";

      var createCard = document.createElement("button");
      createCard.className = "npc-card new-card";
      createCard.type = "button";
      createCard.innerHTML = "<h3>+ New NPC</h3><p>Create blank draft tab</p>";
      createCard.addEventListener("click", createNewNpc);
      grid.appendChild(createCard);

      if (!state.filteredNames.length) {
        var empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = state.npcNames.length
          ? "No NPC tabs match your search."
          : "No printable NPC tabs found in this spreadsheet.";
        grid.appendChild(empty);
        return;
      }

      state.filteredNames.forEach(function(sheetName) {
        var button = document.createElement("button");
        button.className = "npc-card";
        button.type = "button";
        button.innerHTML = "<h3>" + escHtml(sheetName) + "</h3><p>Open editor</p>";
        button.addEventListener("click", function() {
          openNpc(sheetName);
        });
        grid.appendChild(button);
      });
    }

    function createNewNpc() {
      if (!confirmDiscardIfDirty()) return;

      var suggested = "New NPC";
      var requestedName = window.prompt("Name for new NPC tab:", suggested);
      if (requestedName === null) return;

      setStatus("Creating blank NPC draft...", "");
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.sheetName) {
            setStatus("Draft creation failed.", "error");
            return;
          }
          setStatus("Created draft: " + result.sheetName, "ok");
          loadNpcList();
          openNpc(result.sheetName);
        })
        .withFailureHandler(function(err) {
          setStatus("Create failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_createBlankNpcSheet(requestedName);
    }

    function confirmDiscardIfDirty() {
      if (!state.dirty) return true;
      return window.confirm("You have unsaved changes. Discard them?");
    }

    function backToLibrary() {
      if (!confirmDiscardIfDirty()) return;
      showView("home-view");
      state.currentSheetName = null;
      state.rawRows = null;
      state.parsedData = null;
      document.getElementById("preview-front").innerHTML = "";
      document.getElementById("preview-back").innerHTML = "";
      setDirty(false);
      setStatus("Back to NPC library.", "");
    }

    function openNpc(sheetName) {
      if (!confirmDiscardIfDirty()) return;
      setStatus("Loading " + sheetName + "...", "");

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.rows) {
            setStatus("Sheet not found: " + sheetName, "error");
            return;
          }

          state.currentSheetName = sheetName;
          state.rawRows = result.rows;
          state.parsedData = parseRawRows(state.rawRows);
          document.getElementById("editor-title").textContent = "Editing: " + sheetName;
          buildForm(state.parsedData);
          updatePreview();
          setDirty(false);
          showView("editor-view");
        })
        .withFailureHandler(function(err) {
          setStatus("Load failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getRawData(sheetName);
    }

    function parseRawRows(rows) {
      var data = {
        simple: {},
        damage: [],
        conditions: [],
        skills: [],
        actions: [],
        bonusActions: [],
        reactions: [],
        spells: { cantrips: null, levels: [] },
        special: []
      };

      for (var i = 0; i < rows.length; i++) {
        var label = ((rows[i][0] || "") + "").trim();
        if (!label) continue;

        var labelLower = label.toLowerCase();
        var c = rows[i][1] || "";
        var d = rows[i][2] || "";
        var e = rows[i][3] || "";

        if (SIMPLE_KEYS.indexOf(labelLower) !== -1) {
          data.simple[labelLower] = { rowIndex: i, value: c, flag1: d, flag2: e };
          continue;
        }

        if (labelLower === "damage") {
          data.damage.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "conditions") {
          data.conditions.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "skills") {
          data.skills.push({ rowIndex: i, name: c, modifier: d, flag: e });
          continue;
        }

        if (labelLower === "action") {
          data.actions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "bonus action") {
          data.bonusActions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "reaction") {
          data.reactions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "special") {
          data.special.push({ rowIndex: i, text: c, newLine: d });
          continue;
        }

        if (labelLower === "cantrips") {
          data.spells.cantrips = { rowIndex: i, value: c };
          continue;
        }

        var slotMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spell\s+slots$/);
        var spellMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spells$/);

        if (slotMatch) {
          var slotIndex = parseInt(slotMatch[1], 10) - 1;
          data.spells.levels[slotIndex] = data.spells.levels[slotIndex] || {};
          data.spells.levels[slotIndex].slotsRowIndex = i;
          data.spells.levels[slotIndex].slots = c;
          continue;
        }

        if (spellMatch) {
          var spellIndex = parseInt(spellMatch[1], 10) - 1;
          data.spells.levels[spellIndex] = data.spells.levels[spellIndex] || {};
          data.spells.levels[spellIndex].spellsRowIndex = i;
          data.spells.levels[spellIndex].spells = c;
        }
      }

      return data;
    }

        html += selectInput("skill-" + i + "-flag", ADV_OPTIONS, skill.flag);
        html += repeatRowRemoveButton("skills", i, "skill row");
        html += "</div>";
      });
      html += "</div>";

      html += "</div>";

    function simpleField(label, key, data, useRich, options) {
      var opts = options || {};
      var value = data.simple[key] ? data.simple[key].value : "";
      var id = "field-" + key.replace(/\s+/g, "-");
      var rich = useRich || !!RICH_SIMPLE_KEYS[key];
      var labelClassAttr = opts.labelClass ? " class='" + escAttr(String(opts.labelClass)) + "'" : "";
      if (rich) {
        return "<label" + labelClassAttr + ">" + escHtml(label) + "</label>" + richTextField(id, value);
      }

      if (opts.type === "number") {
        return "<label" + labelClassAttr + ">" + escHtml(label) + numberInput(id, value, opts) + "</label>";
      }

      if (opts.type === "cr") {
        return "<label" + labelClassAttr + ">" + escHtml(label) + numberInput(id, value, {
          allowBlank: true,
          stepper: !!opts.stepper,
          sequence: "cr",
          extraClass: opts.extraClass
        }) + "</label>";
      }

      if (opts.selectOptions) {
        return "<label" + labelClassAttr + ">" + escHtml(label) + selectInput(id, opts.selectOptions, value) + "</label>";
      }

      if (opts.signed) {
        return "<label" + labelClassAttr + ">" + escHtml(label) + textInput(id, normalizeSignedValue(value, opts.defaultValue || "+0"), !!opts.readonly, opts) + "</label>";
      }

      return "<label" + labelClassAttr + ">" + escHtml(label) + textInput(id, value, !!opts.readonly, opts) + "</label>";
    }

    function attributeMatrixHtml(data) {
      var html = "<div class='attr-matrix'>";
      html += "<div class='attr-matrix-head'>"
        + "<div>Stat</div>"
        + "<div>Score</div>"
        + "<div>Modifier</div>"
        + "<div>Save</div>"
        + "<div>Save Flag</div>"
        + "</div>";

      STATS.forEach(function(stat) {
        html += attributeMatrixRowHtml(stat, data);
      });

      html += "</div>";
      return html;
    }

    function attributeMatrixRowHtml(stat, data) {
      var abbrMap = {
        strength: "STR",
        dexterity: "DEX",
        constitution: "CON",
        intelligence: "INT",
        wisdom: "WIS",
        charisma: "CHA"
      };
      var titleMap = {
        strength: "Strength",
        dexterity: "Dexterity",
        constitution: "Constitution",
        intelligence: "Intelligence",
        wisdom: "Wisdom",
        charisma: "Charisma"
      };

      var score = data.simple[stat] ? data.simple[stat].value : "";
      var modValue = data.simple[stat + " mod"] ? data.simple[stat + " mod"].value : "";
      var saveValue = data.simple[stat + " save"] ? data.simple[stat + " save"].value : "";
      var saveFlag = "";
      if (data.simple[stat + " save"]) {
        saveFlag = data.simple[stat + " save"].flag1 || data.simple[stat + " save"].flag2 || "";
      }

      var derivedMod = normalizeSignedValue(
        modValue,
        formatSignedNumber(dndModifier(normalizeNonNegativeInt(score, 10)))
      );

      return "<div class='attr-matrix-row'>"
        + "<div class='attr-stat-cell' title='" + escAttr(titleMap[stat] || stat) + "'>" + escHtml(abbrMap[stat] || stat.toUpperCase()) + "</div>"
        + "<div>" + numberInput("field-" + stat, score, { type: "number", min: 0, step: 1, defaultValue: 10, stepper: true, extraClass: "attr-score-input" }) + "</div>"
        + "<div><span class='attr-derived-text' id='field-" + stat + "-mod'>" + escHtml(derivedMod) + "</span></div>"
        + "<div>" + numberInput("field-" + stat + "-save", saveValue, { type: "number", step: 1, defaultValue: 0, stepper: true, extraClass: "attr-save-input" }) + "</div>"
        + "<div>" + selectInput("field-" + stat + "-save-flag", ADV_OPTIONS, saveFlag) + "</div>"
        + "</div>";
    }

    function speedVariantsEditorHtml(data) {
      var variants = [];
      var climb = data.simple["climb speed"] ? (data.simple["climb speed"].value || "") : "";
      var swim = data.simple["swim speed"] ? (data.simple["swim speed"].value || "") : "";
      var fly = data.simple["fly speed"] ? (data.simple["fly speed"].value || "") : "";

      if ((climb + "").trim()) variants.push({ type: "Climb", value: climb });
      if ((swim + "").trim()) variants.push({ type: "Swim", value: swim });
      if ((fly + "").trim()) variants.push({ type: "Fly", value: fly });
      while (variants.length < 2) variants.push({ type: "", value: "" });
      variants = variants.slice(0, 2);

      var typeOptions = ["", "Climb", "Swim", "Fly"];
      var movementMeta = getExpandableMeta(variants, "movement");
      var html = "<div class='speed-variants'>";
      html += "<p class='movement-kicker'>Additional Movement Modes</p>";
      html += "<div class='movement-list-head'>"
        + "  <div>Movement</div>"
        + "  <div>Speed</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list movement-list'>";
      for (var i = 0; i < variants.length; i++) {
        var hiddenClass = movementMeta.visible[i] ? "" : " is-hidden";
        html += "<div class='movement-row row-editor-row expand-row expand-movement" + hiddenClass + "' data-row-index='" + i + "'>"
          + selectInput("speed-variant-" + (i + 1) + "-type", typeOptions, variants[i].type || "")
          + numberInput("speed-variant-" + (i + 1) + "-value", variants[i].value || "", { min: 0, step: 1, allowBlank: true, stepper: true })
          + repeatRowRemoveButton("movement", i, "movement mode")
          + "</div>";
      }
      html += "</div>";
      html += renderAddRowButton("movement", "Add Movement Mode", movementMeta.hiddenCount, true);
      html += "</div>";
      return html;
    }

    function damageRuleRowHtml(index, row, hiddenClass) {
      var hc = hiddenClass || "";
      return "<div class='damage-row row-editor-row expand-row expand-damage" + hc + "' data-row-index='" + index + "'>"
        + selectInput("damage-" + index + "-value", DAMAGE_TYPE_OPTIONS, (row && row.value) || "")
        + selectInput("damage-" + index + "-flag1", DAMAGE_FLAG1_OPTIONS, (row && row.flag1) || "")
        + selectInput("damage-" + index + "-flag2", DAMAGE_FLAG2_OPTIONS, (row && row.flag2) || "")
        + repeatRowRemoveButton("damage", index, "damage rule")
        + "</div>";
    }

    function conditionRuleRowHtml(index, row, hiddenClass) {
      var hc = hiddenClass || "";

    function initNumberSteppers(scopeEl) {
      var scope = scopeEl && scopeEl.querySelectorAll ? scopeEl : document;
      var steppers = scope.querySelectorAll(".num-stepper");
      for (var i = 0; i < steppers.length; i++) {
        (function(stepper) {
          if (stepper.getAttribute("data-stepper-bound") === "true") return;
          stepper.setAttribute("data-stepper-bound", "true");
          var input = stepper.querySelector(".num-input");
          var down = stepper.querySelector(".step-down");
          var up = stepper.querySelector(".step-up");
          if (!input || !down || !up) return;

          var holdStartTimer = null;
          var holdRepeatTimer = null;

          function clearHoldTimers() {
            if (holdStartTimer) {
              clearTimeout(holdStartTimer);
              holdStartTimer = null;
            }
            if (holdRepeatTimer) {
              clearInterval(holdRepeatTimer);
              holdRepeatTimer = null;
            }
          }

          function adjust(delta) {
            if (input.disabled || input.readOnly) return;
            var sequenceType = input.getAttribute("data-sequence") || "";
            if (sequenceType === "cr") {
              var currentCrIndex = crValueToIndex(input.value);
              var nextCrIndex = currentCrIndex;
              if (delta > 0) nextCrIndex = currentCrIndex <= 0 ? 1 : (currentCrIndex + 1);
              if (delta < 0) nextCrIndex = currentCrIndex <= 1 ? 0 : (currentCrIndex - 1);
              input.value = crIndexToValue(nextCrIndex);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var minAttr = input.getAttribute("min");
            var hasMin = minAttr !== null && minAttr !== "";
            var min = hasMin ? parseInt(minAttr, 10) : 0;
            if (isNaN(min)) min = 0;
            var clearAtMin = input.getAttribute("data-clear-at-min") === "true";
            var blankSeedAttr = input.getAttribute("data-blank-seed");
            var raw = (input.value || "").trim();
            if (raw === "") {
              if (delta < 0 && clearAtMin) return;
              if (blankSeedAttr !== null && blankSeedAttr !== "") {
                var blankSeed = parseInt(blankSeedAttr, 10);
                if (!isNaN(blankSeed)) {
                  input.value = String(blankSeed);
                  input.dispatchEvent(new Event("input", { bubbles: true }));
                  input.dispatchEvent(new Event("change", { bubbles: true }));
                  return;
                }
              }
              input.value = String(hasMin ? min : 0);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var current = parseInt(String(raw).replace(/[^\d-]/g, ""), 10);
            if (isNaN(current)) current = hasMin ? min : 0;
            if (delta < 0 && clearAtMin && hasMin && current === min) {
              input.value = "";
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var next = current + delta;
            if (hasMin && next < min) next = min;
            input.value = String(next);
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.dispatchEvent(new Event("change", { bubbles: true }));
          }

          if (input.getAttribute("data-sequence") === "cr") {
            var normalizeCrInput = function() {
              var normalizedCr = normalizeCrValue(input.value);
              if (input.value !== normalizedCr) input.value = normalizedCr;
            };
            input.addEventListener("blur", normalizeCrInput);
            input.addEventListener("change", normalizeCrInput);
          }

          function startHold(delta, ev) {
            if (ev) ev.preventDefault();
            clearHoldTimers();
            adjust(delta);
            holdStartTimer = setTimeout(function() {
              holdRepeatTimer = setInterval(function() { adjust(delta); }, 90);
            }, 320);
          }

          function stopHold() {
            clearHoldTimers();
          }

          down.addEventListener("mousedown", function(e) { startHold(-1, e); });
          up.addEventListener("mousedown", function(e) { startHold(1, e); });
          down.addEventListener("touchstart", function(e) { startHold(-1, e); }, { passive: false });
          up.addEventListener("touchstart", function(e) { startHold(1, e); }, { passive: false });

          down.addEventListener("mouseup", stopHold);
          up.addEventListener("mouseup", stopHold);
          down.addEventListener("mouseleave", stopHold);
          up.addEventListener("mouseleave", stopHold);
          down.addEventListener("touchend", stopHold);
          up.addEventListener("touchend", stopHold);
          down.addEventListener("touchcancel", stopHold);
          up.addEventListener("touchcancel", stopHold);
          document.addEventListener("mouseup", stopHold);
          document.addEventListener("touchend", stopHold);
        })(steppers[i]);
      }
    }

      for (var i = 0; i < list.length; i++) {
        if (isExpandableRowFilled(list[i], rowType)) filledIndexes.push(i);
        else emptyIndexes.push(i);
      }

      var targetVisible = Math.min(list.length, Math.max(1, filledIndexes.length + 1));
      var visibleCount = 0;
      for (var f = 0; f < filledIndexes.length; f++) {
        visible[filledIndexes[f]] = true;

      for (var e = 0; e < emptyIndexes.length && visibleCount < targetVisible; e++) {

        conditionList.insertAdjacentHTML("beforeend", conditionRuleRowHtml(conditionIndex, conditionItem, ""));

      if (rowType === "special") {

    function initExpandableSections() {
      function getNextHiddenRowAfterVisible(sectionKey) {
        var visibleRows = document.querySelectorAll(".expand-row.expand-" + sectionKey + ":not(.is-hidden)");
        var maxVisibleIndex = -1;
        for (var v = 0; v < visibleRows.length; v++) {
          var visibleIdx = parseInt(visibleRows[v].getAttribute("data-row-index"), 10);
          if (!isNaN(visibleIdx) && visibleIdx > maxVisibleIndex) {
            maxVisibleIndex = visibleIdx;
          }
        }

        var hiddenRows = document.querySelectorAll(".expand-row.expand-" + sectionKey + ".is-hidden");
        var bestHidden = null;
        var bestHiddenIndex = Number.POSITIVE_INFINITY;
        for (var h = 0; h < hiddenRows.length; h++) {
          var hiddenIdx = parseInt(hiddenRows[h].getAttribute("data-row-index"), 10);
          if (isNaN(hiddenIdx) || hiddenIdx <= maxVisibleIndex) continue;
          if (hiddenIdx < bestHiddenIndex) {
            bestHidden = hiddenRows[h];
            bestHiddenIndex = hiddenIdx;
          }
        }
        return bestHidden;
      }

      var addButtons = document.querySelectorAll(".add-row-btn[data-section]");
      for (var i = 0; i < addButtons.length; i++) {
        (function(btn) {
          btn.addEventListener("click", function() {
            var key = btn.getAttribute("data-section");
            if (!key) return;
            var allowDynamicAdd = key === "damage" || key === "conditions" || key === "special";
            var nextHidden = null;
            if (key === "special" || key === "actions" || key === "bonusActions" || key === "reactions") {
              nextHidden = getNextHiddenRowAfterVisible(key);
            } else {
              nextHidden = document.querySelector(".expand-row.expand-" + key + ".is-hidden");
            }
            if (!nextHidden) {
              if (allowDynamicAdd && appendDynamicDefenseRow(key)) {
                btn.disabled = false;
                setDirty(true);
                updatePreview();
                return;
              }
              btn.disabled = true;
              return;
            }
            nextHidden.classList.remove("is-hidden");
            if (!document.querySelector(".expand-row.expand-" + key + ".is-hidden")) {
              btn.disabled = !allowDynamicAdd;

            syncRepeatRowRemoveButtons(key);

      var row = document.querySelector(".expand-row.expand-" + rowType + "[data-row-index='" + index + "']");
      if (!row || row.classList.contains("is-hidden")) return;

    function syncSpecialNewlineControls() {
      var visibleRows = document.querySelectorAll(".expand-row.expand-special:not(.is-hidden)");
      for (var i = 0; i < visibleRows.length; i++) {
        var checkbox = visibleRows[i].querySelector("input[type='checkbox'][id$='-newline']");
        if (!checkbox) continue;
        if (i === 0) {
          checkbox.checked = false;
          checkbox.disabled = true;
          checkbox.setAttribute("tabindex", "-1");

          checkbox.disabled = false;
          checkbox.removeAttribute("tabindex");
        }
      }

    function syncRepeatRowRemoveButtons(rowType) {
      if (rowType === "special") syncSpecialNewlineControls();
      var buttons = document.querySelectorAll(".row-remove-btn[data-row-remove='" + rowType + "']");
      var rows = document.querySelectorAll(".expand-row.expand-" + rowType);
      for (var r = 0; r < rows.length; r++) {
        rows[r].classList.remove("is-last-visible");
      }
      if (!buttons.length) return;

      var visibleRows = document.querySelectorAll(".expand-row.expand-" + rowType + ":not(.is-hidden)");
      if (visibleRows.length) {
        visibleRows[visibleRows.length - 1].classList.add("is-last-visible");
      }
      var show = visibleRows.length > 1;
      for (var i = 0; i < buttons.length; i++) {
        buttons[i].style.visibility = show ? "visible" : "hidden";
        if (show) buttons[i].removeAttribute("tabindex");
        else buttons[i].setAttribute("tabindex", "-1");

    function initRepeatableRowActions() {

        for (var j = 0; j < buttons.length; j++) {
          (function(btn) {
            if (btn.getAttribute("data-row-action-bound") === "true") return;

      var clearButtons = document.querySelectorAll(".row-clear-btn[data-row-clear][data-row-index]");

      syncRepeatRowRemoveButtons("movement");
      syncRepeatRowRemoveButtons("damage");
      syncRepeatRowRemoveButtons("conditions");
      syncRepeatRowRemoveButtons("skills");
      syncRepeatRowRemoveButtons("actions");
      syncRepeatRowRemoveButtons("bonusActions");
      syncRepeatRowRemoveButtons("reactions");

    function richTextField(id, value, placeholder, mode) {

    var richSelectionRanges = {};
    var richTextGlobalListenersBound = false;

    function isRangeWithinField(range, field) {
      return !!(range && field && field.contains(range.commonAncestorContainer));
    }

    function captureRichFieldSelection(field) {
      if (!field || !field.id) return;
      var sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      var range = sel.getRangeAt(0);
      if (!isRangeWithinField(range, field)) return;
      richSelectionRanges[field.id] = range.cloneRange();
    }

    function restoreRichFieldSelection(field, fallbackToEnd) {
      if (!field) return null;
      var sel = window.getSelection();
      var range = null;
      var cached = field.id ? richSelectionRanges[field.id] : null;
      if (cached && isRangeWithinField(cached, field)) {
        range = cached.cloneRange();
      } else if (sel && sel.rangeCount) {
        var active = sel.getRangeAt(0);
        if (isRangeWithinField(active, field)) range = active.cloneRange();
      }
      if (!range && fallbackToEnd !== false) {
        range = document.createRange();
        range.selectNodeContents(field);
        range.collapse(false);
      }
      if (!range || !sel) return null;
      sel.removeAllRanges();
      sel.addRange(range);
      return range;
    }

    function closeOpenRichPopovers(exceptWrap) {
      var openWraps = document.querySelectorAll(".action-desc-editor .rt-menu-wrap.is-open");
      for (var i = 0; i < openWraps.length; i++) {
        if (exceptWrap && openWraps[i] === exceptWrap) continue;
        openWraps[i].classList.remove("is-open");
      }
    }

    function normalizeRichFieldPlaceholderState(field) {
      if (!field) return;
      var plain = (field.textContent || "").replace(/\u00a0/g, " ").trim();
      if (plain !== "") return;
      field.innerHTML = "";
    }

    function alignPopoverToToolbarStart(wrap) {
      if (!wrap) return;
      var panel = wrap.querySelector(".rt-popover");
      var trigger = wrap.querySelector(".rt-menu-trigger[data-popover]");
      if (!panel || !trigger) return;
      panel.style.left = "-1px";
      panel.style.right = "auto";
    }

    function applyActionSelectionCommand(fieldId, cmd) {
      var field = document.getElementById(fieldId);
      if (!field) return;
      field.focus();
      var range = restoreRichFieldSelection(field, false);
      if (!range || range.collapsed) return;
      document.execCommand(cmd, false, null);
      normalizeRichFieldPlaceholderState(field);
      captureRichFieldSelection(field);
      setDirty(true);
      updatePreview();
    }

    function insertActionSymbol(fieldId, symbol) {
      var field = document.getElementById(fieldId);
      if (!field) return;
      field.focus();
      var range = restoreRichFieldSelection(field, true);
      if (!range) return;
      range.deleteContents();
      var textNode = document.createTextNode(symbol || "");
      range.insertNode(textNode);
      range.setStartAfter(textNode);
      range.collapse(true);
      var sel = window.getSelection();
      if (sel) {
        sel.removeAllRanges();
        sel.addRange(range);
      }
      normalizeRichFieldPlaceholderState(field);
      captureRichFieldSelection(field);
      setDirty(true);
      updatePreview();
    }

    function initRichTextFields() {
      var fields = document.querySelectorAll(".rt-field");
      for (var f = 0; f < fields.length; f++) {
        (function(field) {
          if (field.getAttribute("data-rich-selection-bound") === "true") return;
          field.setAttribute("data-rich-selection-bound", "true");
          normalizeRichFieldPlaceholderState(field);
          field.addEventListener("keyup", function() { captureRichFieldSelection(field); });
          field.addEventListener("mouseup", function() { captureRichFieldSelection(field); });
          field.addEventListener("focus", function() { captureRichFieldSelection(field); });
          field.addEventListener("input", function() {
            normalizeRichFieldPlaceholderState(field);
            captureRichFieldSelection(field);
          });
          field.addEventListener("blur", function() {
            normalizeRichFieldPlaceholderState(field);
          });
        })(fields[f]);
      }

      if (!richTextGlobalListenersBound) {
        document.addEventListener("click", function(e) {
          if (e.target.closest(".action-desc-editor .rt-menu-wrap")) return;
          closeOpenRichPopovers();
        });
        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") closeOpenRichPopovers();
        });
        richTextGlobalListenersBound = true;
      }

      var triggers = document.querySelectorAll(".rt-toolbar-menu .rt-menu-trigger[data-popover]");
      for (var t = 0; t < triggers.length; t++) {
        (function(trigger) {
          if (trigger.getAttribute("data-rt-menu-bound") === "true") return;
          trigger.setAttribute("data-rt-menu-bound", "true");
          trigger.addEventListener("mousedown", function(e) {
            e.preventDefault();
          });
          trigger.addEventListener("click", function(e) {
            e.preventDefault();
            e.stopPropagation();
            var wrap = trigger.closest(".rt-menu-wrap");
            if (!wrap) return;
            var willOpen = !wrap.classList.contains("is-open");
            closeOpenRichPopovers(willOpen ? wrap : null);
            if (willOpen) {
              alignPopoverToToolbarStart(wrap);
              wrap.classList.add("is-open");
              var toolbar = trigger.closest(".rt-toolbar");
              var fieldId = toolbar ? toolbar.getAttribute("data-for") : "";
              var field = fieldId ? document.getElementById(fieldId) : null;
              if (field) captureRichFieldSelection(field);
            } else {
              wrap.classList.remove("is-open");
            }
          });
        })(triggers[t]);
      }

      var buttons = document.querySelectorAll(".rt-toolbar button[data-cmd]");
      for (var i = 0; i < buttons.length; i++) {
        (function(btn) {
          if (btn.getAttribute("data-rt-cmd-bound") === "true") return;
          btn.setAttribute("data-rt-cmd-bound", "true");
          btn.addEventListener("mousedown", function(e) {
            e.preventDefault();
          });
          btn.addEventListener("click", function(e) {
            e.preventDefault();
            var cmd = btn.getAttribute("data-cmd");
            if (!cmd) return;
            var toolbar = btn.closest(".rt-toolbar");
            if (toolbar && toolbar.classList.contains("rt-toolbar-menu")) {
              var fieldId = toolbar.getAttribute("data-for") || "";
              applyActionSelectionCommand(fieldId, cmd);
              closeOpenRichPopovers();
            } else {
              document.execCommand(cmd, false, null);
              setDirty(true);
              updatePreview();
            }
          });
        })(buttons[i]);
      }

      var symbolButtons = document.querySelectorAll(".rt-toolbar button[data-insert-symbol]");
      for (var s = 0; s < symbolButtons.length; s++) {
        (function(btn) {
          if (btn.getAttribute("data-rt-symbol-bound") === "true") return;
          btn.setAttribute("data-rt-symbol-bound", "true");
          btn.addEventListener("mousedown", function(e) {
            e.preventDefault();
          });
          btn.addEventListener("click", function(e) {
            e.preventDefault();
            var symbol = btn.getAttribute("data-insert-symbol") || "";
            var toolbar = btn.closest(".rt-toolbar");
            var fieldId = toolbar ? (toolbar.getAttribute("data-for") || "") : "";
            insertActionSymbol(fieldId, symbol);
            closeOpenRichPopovers();
          });
        })(symbolButtons[s]);
      }
    }

    function refreshDerivedModifiers() {
      STATS.forEach(function(stat) {
        var score = getScoreValue(stat);
        var mod = formatSignedNumber(dndModifier(score));
        var modEl = document.getElementById("field-" + stat + "-mod");
        if (modEl) {
          if (typeof modEl.value === "string") modEl.value = mod;
          else modEl.textContent = mod;
        }

        var saveEl = document.getElementById("field-" + stat + "-save");
        if (saveEl) {
          if (saveEl.type === "number") {
            var parsed = parseInt(String(saveEl.value || "").replace(/[^\d-]/g, ""), 10);
            if (isNaN(parsed)) parsed = 0;
            saveEl.value = String(parsed);
          } else {
            saveEl.value = normalizeSignedValue(saveEl.value, "+0");
          }
        }
      });

      var proficiencyEl = document.getElementById("field-proficiency-bonus");
      if (proficiencyEl) {
        var profRaw = (proficiencyEl.value || "").trim();
        if (profRaw !== "") {
          proficiencyEl.value = normalizePositiveIntOrBlank(profRaw);
        }
      }

      var passiveEl = document.getElementById("field-passive-perception");
      if (passiveEl) {
        var passiveRaw = (passiveEl.value || "").trim();
        if (passiveRaw !== "") {
          passiveEl.value = String(normalizeNonNegativeInt(passiveRaw, 10));
        }
      }
    }

    function wireDirtyTracking(root) {
      var fields = root.querySelectorAll("input, select, textarea, .rt-field");
      for (var i = 0; i < fields.length; i++) {
        fields[i].addEventListener("input", function() { refreshDerivedModifiers(); setDirty(true); updatePreview(); });
        fields[i].addEventListener("change", function() { refreshDerivedModifiers(); setDirty(true); updatePreview(); });
      }
    }

    function updatePreview() {
      if (!state.parsedData) return;
      var model = collectPreviewData();
      renderFrontPreview(model);
      renderBackPreview(model);
