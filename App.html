<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPQ NPC Builder</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --panel: #ffffff;
      --ink: #1a1d24;
      --muted: #5d6574;
      --line: #d7dce8;
      --primary: #0f5da8;
      --primary-strong: #094882;
      --success: #127f39;
      --warn: #b16f00;
      --danger: #ba1f33;
      --shadow: 0 10px 30px rgba(20, 31, 56, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --field-ch: 30ch;
      --space-1: 4px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 10px;
      --space-5: 12px;
      --space-6: 16px;
      --field-h: 32px;
      --field-line-h: 20.667px;
      --field-pad-y: 5px;
      --field-pad-x: 8px;
      --surface-soft: #fbfdff;
      --row-action-w: 68px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% -20%, #fdf7df 0%, #f3f4f8 35%, #eef2f8 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100vh;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(120deg, #ffffff 0%, #f7f9fd 55%, #fff9e9 100%);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    #status {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      max-width: 440px;
    }

    #status.ok { color: var(--success); }
    #status.warn { color: var(--warn); }
    #status.error { color: var(--danger); }

    .view {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .view.active { display: block; }

    .home-wrap {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .home-title {
      margin: 0;
      font-size: 18px;
    }

    .home-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .home-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #library-print-meta {
      font-size: 12px;
      color: var(--muted);
      min-width: 128px;
      text-align: right;
    }

    .npc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .npc-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%);
      padding: 12px;
      text-align: left;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .npc-card:hover {
      transform: translateY(-2px);
      border-color: #7fa7d5;
      box-shadow: 0 8px 20px rgba(15, 93, 168, 0.12);
    }

    .npc-card h3 {
      margin: 0;
      font-size: 15px;
      color: #123761;
    }

    .npc-card p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .npc-card.new-card {
      border-style: dashed;
      border-color: #8cb2df;
      background: linear-gradient(120deg, #f5f9ff 0%, #ffffff 100%);
    }

    .npc-card.new-card h3 {
      color: #0f5da8;
    }

    .npc-card.selected-for-print {
      border-color: #6d9acd;
      box-shadow: 0 0 0 2px rgba(15, 93, 168, 0.12) inset;
      background: linear-gradient(120deg, #f3f8ff 0%, #ffffff 100%);
    }

    .npc-card-actions {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .npc-card-actions .btn {
      padding: 5px 8px;
      font-size: 11px;
    }

    .empty-note {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: #fbfcff;
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      min-height: 70vh;
    }

    .editor-toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      background: #ffffffee;
      backdrop-filter: blur(6px);
      padding: 8px 12px;
    }

    #editor-title {
      margin-right: auto;
      font-weight: 700;
      color: #1a3c66;
    }

    .editor-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: var(--space-4);
      align-items: start;
      padding: var(--space-4);
    }

    .editor-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }

    .preview-pane {
      position: sticky;
      top: 56px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      padding: var(--space-3);
    }

    .preview-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: #4f5d72;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .preview-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .preview-frame {
      width: 100%;
      border: 1px solid #d8dfea;
      border-radius: 8px;
      padding: 6px;
      background: #eef4ff;
      display: flex;
      justify-content: center;
    }

    .preview-label {
      margin: 0 0 6px;
      font-size: 11px;
      color: #5b6b81;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .card-preview {
      font-family: Arial, sans-serif;
      width: 2.5in;
      height: 3.5in;
      background: #fff;
      border-radius: 6px;
      padding: 6px;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .card-preview .name {
      font-size: 22px;
      font-weight: bold;
      width: 100%;
      text-align: left;
    }

    .card-preview .subtitle {
      font-size: 11px;
      font-style: italic;
      color: #555;
      width: 100%;
      text-align: left;
      margin-bottom: 4px;
      white-space: normal;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .card-preview .row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 2px;
    }

    .card-preview .unified-card {
      flex: 1;
      background: #f0f0f0;
      border-radius: 4px;
      padding: 4px;
      margin: 0 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: auto;
    }

    .card-preview .label {
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 1px;
      color: #111;
      text-transform: none;
      letter-spacing: 0;
    }

    .card-preview .value-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card-preview .primary-value {
      font-size: 18px;
      font-weight: bold;
    }

    /* Keep stat tiles stable while editing empty values without forcing larger cards. */
    .card-preview .primary-value:empty::before {
      content: "\00a0";
    }

    .card-preview .secondary-stack {
      display: flex;
      flex-direction: column;
      font-size: 10px;
      line-height: 1;
      text-align: left;
      min-width: 20px;
      justify-content: center;
    }

    .card-preview .block-title {
      width: 100%;
      text-align: left;
      font-weight: bold;
      margin: 3px 0 2px;
      font-size: 12px;
      border-bottom: 1px solid #ccc;
    }

    .card-preview .text-line {
      width: 100%;
      font-size: 10px;
      line-height: 1.2;
    }

    .card-preview .description-block {
      width: 100%;
      margin: 1px 0 2px 0;
      font-size: 10px;
      line-height: 1.2;
    }
    .card-preview .attributes-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 2px;
    }
    .card-preview .attributes-grid .row {
      margin-bottom: 0;
    }

    .card-preview .description-block strong {
      font-weight: bold;
    }

    .card-preview .spells-line {
      position: relative;
    }

    .card-preview .spells-brackets {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: var(--space-4);
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .section h2 {
      margin: 0;
      font-size: 14px;
      color: #163b63;
      letter-spacing: 0.15px;
    }

    .section h3 {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      color: #4a5e78;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      border: 0;
      padding: 0;
    }
    .section h3 + .defense-subsection,
    .section h3 + .skills-subsection {
      margin-top: -2px;
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-stat { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: var(--space-3); }
    .identity-name-wrap { max-width: 30ch; }
    .identity-name-wrap > label {
      font-size: 10px;
      color: #304b6b;
      letter-spacing: 0.45px;
    }
    .identity-name-wrap > label > input[type="text"] {
      width: min(100%, 27ch);
      min-height: 36px;
      font-size: 18px;
      font-weight: 700;
      color: #173657;
      letter-spacing: 0.2px;
    }
    .identity-class-wrap { max-width: 100%; margin-top: var(--space-1); }
    .identity-size-race {
      max-width: 52ch;
      grid-template-columns: 132px minmax(0, 1fr) 92px;
      align-items: end;
    }
    .identity-size-race > label.identity-cr-field > .num-stepper {
      max-width: 92px;
    }
    .combat-core {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 120px));
      gap: var(--space-2);
      align-items: start;
      justify-content: start;
    }
    .combat-core > label {
      align-items: center;
    }
    .speed-variants {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 100%;
      width: max-content;
      padding-left: 0;
      border-left: 0;
    }
    .movement-kicker {
      margin: 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #627287;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .movement-list-head,
    .movement-row {
      display: grid;
      grid-template-columns: 132px 90px 56px;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .movement-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .movement-list-head > div:nth-child(2),
    .movement-list-head > div:nth-child(3) {
      text-align: center;
    }
    .movement-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .movement-row select,
    .movement-row .num-stepper {
      width: 100%;
      max-width: 100%;
    }
    .movement-row .num-stepper {
      max-width: 90px;
    }
    .movement-row .row-remove-btn {
      justify-self: center;
    }
    .movement-list + .section-add-row {
      margin-top: var(--space-2);
    }

    .repeat-row {
      border: 1px solid #e5ebf5;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      padding: var(--space-2);
    }

    .repeat-inline {
      display: grid;
      align-items: end;
      justify-content: stretch;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .flag-row {
      grid-template-columns: minmax(20ch, 1.7fr) minmax(14ch, 1fr) minmax(13ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .condition-row {
      grid-template-columns: minmax(20ch, 1.8fr) minmax(14ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .skill-row {
      grid-template-columns: minmax(18ch, 1.5fr) minmax(9ch, 0.75fr) minmax(12ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .skills-summary-core {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 120px));
      gap: var(--space-2);
      align-items: start;
      justify-content: start;
      width: max-content;
      max-width: 100%;
    }
    .skills-summary-core > label {
      min-width: 0;
      width: 100%;
      align-items: center;
      text-align: center;
    }
    .skills-summary-core .num-stepper {
      width: 100%;
      max-width: 120px;
    }
    .skills-summary-core .skills-signed-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-summary-core .skills-passive-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-vision-row {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: min(100%, 22ch);
    }
    .skills-vision-row > label {
      min-width: 0;
      width: 100%;
      max-width: 100%;
    }
    .skills-vision-row .skills-vision-input {
      width: 100%;
      max-width: 100%;
    }
    .skills-list-head,
    .skills-rule-row {
      display: grid;
      grid-template-columns: 170px 92px 114px 56px;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .skills-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .skills-list-head > div:nth-child(2),
    .skills-list-head > div:nth-child(4) {
      text-align: center;
    }
    .skills-rule-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .skills-rule-row select,
    .skills-rule-row .num-stepper {
      width: 100%;
      max-width: 100%;
    }
    .skills-rule-row .num-stepper {
      max-width: 92px;
    }
    .skills-rule-row .skills-mod-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .skills-rule-row .row-remove-btn {
      justify-self: center;
    }
    .skills-list + .section-add-row {
      margin-top: var(--space-2);
    }
    .skills-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .skills-subsection > .section-add-row {
      margin-top: var(--space-2);
    }
    .spell-mode-row {
      width: 210px;
      max-width: 100%;
      margin-bottom: var(--space-1);
    }
    .spell-mode-row > label {
      min-width: 0;
      width: 100%;
    }
    .spell-slot-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .spell-slot-subsection.is-hidden {
      display: none;
    }
    .spell-slot-head,
    .spell-slot-row,
    .spell-uses-head,
    .spell-uses-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
      max-width: 100%;
    }
    .spell-slot-head,
    .spell-slot-row {
      grid-template-columns: 90px 90px 548px 56px;
    }
    .spell-uses-head,
    .spell-uses-row {
      grid-template-columns: 90px 644px 56px;
    }
    .spell-slot-head,
    .spell-uses-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .spell-slot-head > div:nth-child(1),
    .spell-slot-head > div:nth-child(2),
    .spell-slot-head > div:nth-child(4) {
      text-align: center;
    }
    .spell-uses-head > div:nth-child(1),
    .spell-uses-head > div:nth-child(3) {
      text-align: center;
    }
    .spell-slot-row,
    .spell-uses-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .spell-slot-row .num-stepper,
    .spell-slot-row .spell-names-input {
      width: 100%;
      max-width: 100%;
    }
    .spell-slot-row .spell-level-input,
    .spell-slot-row .spell-slots-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .spell-uses-row .num-stepper,
    .spell-uses-row .spell-uses-names-input {
      width: 100%;
      max-width: 100%;
    }
    .spell-uses-row .spell-uses-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .spell-slot-row .row-remove-btn {
      justify-self: center;
      align-self: center;
    }
    .spell-uses-row .row-remove-btn {
      justify-self: center;
      align-self: center;
    }
    .spell-slot-list + .section-add-row,
    .spell-uses-list + .section-add-row {
      margin-top: var(--space-2);
    }
    .defense-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .defense-subsection > .section-add-row {
      margin-top: var(--space-2);
    }
    .defense-list-head,
    .damage-row,
    .condition-rule-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .damage-list-head,
    .damage-row {
      grid-template-columns: 154px 128px 128px 56px;
    }
    .condition-list-head,
    .condition-rule-row {
      grid-template-columns: 154px 128px 56px;
    }
    .defense-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .damage-list-head > div:last-child,
    .condition-list-head > div:last-child {
      text-align: center;
    }
    .damage-row,
    .condition-rule-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .damage-row select,
    .condition-rule-row select {
      width: 100%;
      max-width: 100%;
    }
    .damage-row .row-remove-btn,
    .condition-rule-row .row-remove-btn {
      justify-self: center;
    }

    .attr-matrix {
      border: 1px solid #dbe5f4;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #fff;
      width: max-content;
      max-width: 100%;
    }
    .attr-matrix-head,
    .attr-matrix-row {
      display: grid;
      grid-template-columns: 52px 90px 62px 112px 170px;
      gap: var(--space-2);
      align-items: center;
      padding: 5px 8px;
    }
    .attr-matrix-head {
      background: #f2f6fd;
      border-bottom: 1px solid #dbe5f4;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .attr-matrix-row {

  <div class="shell">
    <header class="app-header">
      <div class="brand">
        <h1>PPQ NPC Stat Cards</h1>
        <p>Standalone editor that saves to your existing spreadsheet tabs.</p>
      </div>
      <div id="status">Loading NPC list...</div>
    </header>

    <section id="home-view" class="view active">
      <div class="home-wrap">
        <div class="home-top">
          <div>
            <h2 class="home-title">NPC Library</h2>
            <p class="home-subtitle">Pick a tab to edit. Existing spreadsheet and print flow remain unchanged.</p>
          </div>
          <div class="home-controls">
            <input id="search-input" type="text" placeholder="Search tab names...">
            <button id="print-library-btn" class="btn">Print Card Page</button>
            <button id="create-btn" class="btn primary">New NPC</button>
            <button id="refresh-btn" class="btn">Refresh List</button>
            <span id="library-print-meta">0 selected</span>
          </div>
        </div>
        <div id="npc-grid" class="npc-grid"></div>
      </div>
    </section>

    <section id="editor-view" class="view">
      <div class="editor-wrap">
        <div class="editor-toolbar">
          <button id="back-btn" class="btn">Back To Library</button>
          <div id="editor-title">Editing:</div>
          <button id="print-btn" class="btn">Print This NPC</button>
          <button id="save-btn" class="btn success">Save Changes</button>
        </div>
        <div class="editor-main">
          <div id="editor-form" class="editor-form"></div>
          <aside class="preview-pane">
            <h3 class="preview-title">Live Card Preview</h3>
            <div class="preview-cards">
              <div class="preview-frame">
                <div>
                  <p class="preview-label">Front</p>
                  <div id="preview-front" class="card-preview"></div>
                </div>
              </div>
              <div class="preview-frame">
                <div>
                  <p class="preview-label">Back</p>
                  <div id="preview-back" class="card-preview"></div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </div>

  <script>
    var state = {
      npcNames: [],
      filteredNames: [],
      selectedForPrint: {},
      currentSheetName: null,
      rawRows: null,
      parsedData: null,
      dirty: false
    };

    var DAMAGE_FLAG1_OPTIONS = ["", "Resistance", "Vulnerability", "Immunity"];
    var DAMAGE_FLAG2_OPTIONS = ["", "Advantage", "Disadvantage"];
    var CONDITION_FLAG_OPTIONS = ["", "Immunity", "Advantage", "Disadvantage"];
    var DND_SIZE_OPTIONS = ["", "Tiny", "Small", "Medium", "Large", "Huge", "Gargantuan"];
    var DND_CONDITION_OPTIONS = [
      "",
      "Blinded", "Charmed", "Deafened", "Exhaustion", "Frightened", "Grappled",
      "Incapacitated", "Invisible", "Paralyzed", "Petrified", "Poisoned",
      "Prone", "Restrained", "Stunned", "Unconscious"
    ];
    var DAMAGE_TYPE_OPTIONS = [
      "",
      "Acid", "Bludgeoning", "Cold", "Fire", "Force", "Lightning", "Magical",
      "Necrotic", "Physical", "Piercing", "Poison", "Psychic", "Radiant",
      "Slashing", "Thunder"
    ];
    var SKILL_OPTIONS = [
      "", "Acrobatics", "Animal Handling", "Arcana", "Athletics", "Deception", "History",
      "Insight", "Intimidation", "Investigation", "Medicine", "Nature", "Perception",
      "Performance", "Persuasion", "Religion", "Sleight of Hand", "Stealth", "Survival"
    ];
    var SKILL_ABILITY_MAP = {
      "Acrobatics": "dexterity",
      "Animal Handling": "wisdom",
      "Arcana": "intelligence",
      "Athletics": "strength",
      "Deception": "charisma",
      "History": "intelligence",
      "Insight": "wisdom",
      "Intimidation": "charisma",
      "Investigation": "intelligence",
      "Medicine": "wisdom",
      "Nature": "intelligence",
      "Perception": "wisdom",
      "Performance": "charisma",
      "Persuasion": "charisma",
      "Religion": "intelligence",
      "Sleight of Hand": "dexterity",
      "Stealth": "dexterity",
      "Survival": "wisdom"
    };
    var SKILL_ABBREV = {
      "Acrobatics": "Acr",
      "Animal Handling": "Ani",
      "Arcana": "Arc",
      "Athletics": "Ath",
      "Deception": "Dec",
      "History": "His",
      "Insight": "Ins",
      "Intimidation": "Inti",
      "Investigation": "Inv",
      "Medicine": "Med",
      "Nature": "Nat",
      "Perception": "Perc",
      "Performance": "Perf",
      "Persuasion": "Pers",
      "Religion": "Rel",
      "Sleight of Hand": "Sle",
      "Stealth": "Ste",
      "Survival": "Sur"
    };
    var ADV_OPTIONS = ["", "Advantage", "Disadvantage"];
    var ACTION_SYMBOL_OPTIONS = [
      { label: "Resistance", symbol: "\u24C7" },
      { label: "Vulnerability", symbol: "\u24CB" },
      { label: "Immunity", symbol: "\u24D8" },
      { label: "Advantage", symbol: "\u25B2" },
      { label: "Disadvantage", symbol: "\u25BC" }
    ];
    var SIMPLE_KEYS = [
      "name", "class", "size", "race", "cr", "ac", "hp", "speed", "climb speed", "swim speed", "fly speed",
      "strength", "strength mod", "strength save", "dexterity", "dexterity mod", "dexterity save",
      "constitution", "constitution mod", "constitution save", "intelligence", "intelligence mod", "intelligence save",
      "wisdom", "wisdom mod", "wisdom save", "charisma", "charisma mod", "charisma save",
      "proficiency bonus", "initiative", "passive perception", "vision"
    ];
    var STATS = ["strength", "dexterity", "constitution", "intelligence", "wisdom", "charisma"];
    var RICH_SIMPLE_KEYS = {};

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      document.getElementById("refresh-btn").addEventListener("click", loadNpcList);
      document.getElementById("create-btn").addEventListener("click", createNewNpc);
      document.getElementById("print-library-btn").addEventListener("click", printLibraryPage);
      document.getElementById("search-input").addEventListener("input", onSearchChanged);
      document.getElementById("back-btn").addEventListener("click", backToLibrary);
      document.getElementById("save-btn").addEventListener("click", saveNpc);
      document.getElementById("print-btn").addEventListener("click", printCurrentNpc);
      window.addEventListener("beforeunload", function(e) {
        if (!state.dirty) return;
        e.preventDefault();
        e.returnValue = "";
      });
      loadNpcList();
    }

    function setStatus(message, tone) {
      var el = document.getElementById("status");
      el.textContent = message;
      el.className = tone || "";
    }

    function setDirty(flag) {
      state.dirty = !!flag;
      if (!state.currentSheetName) return;
      if (state.dirty) {
        setStatus("Unsaved changes: " + state.currentSheetName, "warn");
      } else {
        setStatus("Loaded: " + state.currentSheetName, "ok");
      }
    }

    function showView(viewId) {
      document.getElementById("home-view").classList.remove("active");
      document.getElementById("editor-view").classList.remove("active");
      document.getElementById(viewId).classList.add("active");
    }

    function loadNpcList() {
      setStatus("Loading NPC list...", "");
      google.script.run
        .withSuccessHandler(function(names) {
          state.npcNames = names || [];
          state.filteredNames = state.npcNames.slice();
          pruneSelectedForPrint();
          renderNpcGrid();
          setStatus("Loaded " + state.npcNames.length + " NPC tabs.", "ok");
        })
        .withFailureHandler(function(err) {
          setStatus("Failed to load list: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getSheetNames();
    }

    function onSearchChanged() {
      var q = document.getElementById("search-input").value.toLowerCase().trim();
      if (!q) {
        state.filteredNames = state.npcNames.slice();
      } else {
        state.filteredNames = state.npcNames.filter(function(name) {
          return name.toLowerCase().indexOf(q) !== -1;
        });
      }
      renderNpcGrid();
    }

    function renderNpcGrid() {
      var grid = document.getElementById("npc-grid");
      grid.innerHTML = "";

      var createCard = document.createElement("button");
      createCard.className = "npc-card new-card";
      createCard.type = "button";
      createCard.innerHTML = "<h3>+ New NPC</h3><p>Create blank draft tab</p>";
      createCard.addEventListener("click", createNewNpc);
      grid.appendChild(createCard);

      if (!state.filteredNames.length) {
        var empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = state.npcNames.length
          ? "No NPC tabs match your search."
          : "No printable NPC tabs found in this spreadsheet.";
        grid.appendChild(empty);
        updateLibraryPrintMeta();
        return;
      }

      state.filteredNames.forEach(function(sheetName) {
        var selected = !!state.selectedForPrint[sheetName];
        var card = document.createElement("article");
        card.className = "npc-card" + (selected ? " selected-for-print" : "");

        var heading = document.createElement("h3");
        heading.textContent = sheetName;
        card.appendChild(heading);

        var subtitle = document.createElement("p");
        subtitle.textContent = selected ? "Selected for print page" : "Ready";
        card.appendChild(subtitle);

        var actions = document.createElement("div");
        actions.className = "npc-card-actions";

        var openBtn = document.createElement("button");
        openBtn.type = "button";
        openBtn.className = "btn";
        openBtn.textContent = "Open Editor";
        openBtn.addEventListener("click", function() {
          openNpc(sheetName);
        });
        actions.appendChild(openBtn);

        var selectBtn = document.createElement("button");
        selectBtn.type = "button";
        selectBtn.className = "btn";
        selectBtn.textContent = selected ? "Unselect" : "Select for Print";
        selectBtn.addEventListener("click", function() {
          togglePrintSelection(sheetName);
        });
        actions.appendChild(selectBtn);

        card.appendChild(actions);
        grid.appendChild(card);
      });

      updateLibraryPrintMeta();
    }

    function pruneSelectedForPrint() {
      var valid = {};
      state.npcNames.forEach(function(name) {
        if (state.selectedForPrint[name]) valid[name] = true;
      });
      state.selectedForPrint = valid;
    }

    function togglePrintSelection(sheetName) {
      if (state.selectedForPrint[sheetName]) {
        delete state.selectedForPrint[sheetName];
      } else {
        state.selectedForPrint[sheetName] = true;
      }
      renderNpcGrid();
    }

    function getSelectedPrintNames() {
      return Object.keys(state.selectedForPrint).filter(function(name) {
        return !!state.selectedForPrint[name];
      });
    }

    function updateLibraryPrintMeta() {
      var meta = document.getElementById("library-print-meta");
      if (!meta) return;
      var selectedCount = getSelectedPrintNames().length;
      var filteredCount = state.filteredNames.length;
      if (selectedCount) {
        meta.textContent = selectedCount + " selected";
        return;
      }
      meta.textContent = filteredCount + " visible";
    }

    function createNewNpc() {
      if (!confirmDiscardIfDirty()) return;

      var suggested = "New NPC";
      var requestedName = window.prompt("Name for new NPC tab:", suggested);
      if (requestedName === null) return;

      setStatus("Creating blank NPC draft...", "");
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.sheetName) {
            setStatus("Draft creation failed.", "error");
            return;
          }
          setStatus("Created draft: " + result.sheetName, "ok");
          loadNpcList();
          openNpc(result.sheetName);
        })
        .withFailureHandler(function(err) {
          setStatus("Create failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_createBlankNpcSheet(requestedName);
    }

    function confirmDiscardIfDirty() {
      if (!state.dirty) return true;
      return window.confirm("You have unsaved changes. Discard them?");
    }

    function backToLibrary() {
      if (!confirmDiscardIfDirty()) return;
      showView("home-view");
      state.currentSheetName = null;
      state.rawRows = null;
      state.parsedData = null;
      document.getElementById("preview-front").innerHTML = "";
      document.getElementById("preview-back").innerHTML = "";
      setDirty(false);
      setStatus("Back to NPC library.", "");
    }

    function printLibraryPage() {
      var selected = getSelectedPrintNames();
      var sourceNames = selected.length ? selected : state.filteredNames.slice();
      if (!sourceNames.length) {
        setStatus("No NPCs selected (or visible) to print.", "warn");
        return;
      }

      var names = sourceNames.slice(0, 4);
      if (sourceNames.length > 4) {
        setStatus("Print layout currently supports 4 cards per page. Printing first 4.", "warn");
      } else {
        setStatus("Rendering print page...", "");
      }

      var printWindow = window.open("", "_blank");
      if (!printWindow) {
        setStatus("Pop-up blocked. Allow pop-ups to print.", "warn");
        return;
      }
      printWindow.document.write("<p style='font-family:Arial,sans-serif;padding:16px;'>Rendering print view...</p>");

      google.script.run
        .withSuccessHandler(function(cardsData) {
          var data = cardsData || [];
          if (!data.length) {
            printWindow.document.open();
            printWindow.document.write("<p style='font-family:Arial,sans-serif;padding:16px;color:#b00020;'>No printable cards returned for the selected tabs.</p>");
            printWindow.document.close();
            setStatus("No printable cards found for selected tabs.", "warn");
            return;
          }
          var html = buildUnifiedPrintHtml(data);
          printWindow.document.open();
          printWindow.document.write(html || "");
          printWindow.document.close();
          setStatus("Print page ready (" + data.length + " card" + (data.length === 1 ? "" : "s") + ").", "ok");
        })
        .withFailureHandler(function(err) {
          printWindow.document.open();
          printWindow.document.write("<p style='font-family:Arial,sans-serif;padding:16px;color:#b00020;'>Print render failed: "
            + escHtml((err && err.message ? err.message : err) + "") + "</p>");
          printWindow.document.close();
          setStatus("Print render failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getCardsData(names);
    }

    function openNpc(sheetName) {
      if (!confirmDiscardIfDirty()) return;
      setStatus("Loading " + sheetName + "...", "");

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.rows) {
            setStatus("Sheet not found: " + sheetName, "error");
            return;
          }

          state.currentSheetName = sheetName;
          state.rawRows = result.rows;
          state.parsedData = parseRawRows(state.rawRows);
          document.getElementById("editor-title").textContent = "Editing: " + sheetName;
          buildForm(state.parsedData);
          updatePreview();
          setDirty(false);
          showView("editor-view");
        })
        .withFailureHandler(function(err) {
          setStatus("Load failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getRawData(sheetName);
    }

    function parseRawRows(rows) {
      var data = {
        simple: {},
        damage: [],
        conditions: [],
        skills: [],
        actions: [],
        bonusActions: [],
        reactions: [],
        spells: { mode: "slot", modeRowIndex: null, rows: [], usesRows: [], rowMap: { mode: null, cantrips: null, slots: {}, spells: {}, uses: [] } },
        special: []
      };
      var cantripSpellText = "";
      var spellSlotsByLevel = {};
      var spellListsByLevel = {};
      var parsedUsesRowCount = 0;

      for (var i = 0; i < rows.length; i++) {
        var label = ((rows[i][0] || "") + "").trim();
        if (!label) continue;

        var labelLower = label.toLowerCase();
        var c = rows[i][1] || "";
        var d = rows[i][2] || "";
        var e = rows[i][3] || "";

        if (SIMPLE_KEYS.indexOf(labelLower) !== -1) {
          data.simple[labelLower] = { rowIndex: i, value: c, flag1: d, flag2: e };
          continue;
        }

        if (labelLower === "damage") {
          data.damage.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "conditions") {
          data.conditions.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "skills") {
          data.skills.push({ rowIndex: i, name: c, modifier: d, flag: e });
          continue;
        }

        if (labelLower === "action") {
          data.actions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "bonus action") {
          data.bonusActions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "reaction") {
          data.reactions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "special") {
          data.special.push({ rowIndex: i, text: c, newLine: d });
          continue;
        }

        if (labelLower === "spell casting mode") {
          data.spells.modeRowIndex = i;
          data.spells.rowMap.mode = i;
          data.spells.mode = normalizeSpellCastingMode(c);
          continue;
        }

        if (labelLower === "per-spell uses") {
          parsedUsesRowCount++;
          data.spells.rowMap.uses.push(i);
          data.spells.usesRows.push({ uses: c, spells: d });
          continue;
        }

        if (labelLower === "cantrips") {
          data.spells.rowMap.cantrips = i;
          cantripSpellText = c;
          continue;
        }

        var slotMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spell\s+slots$/);
        var spellMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spells$/);

        if (slotMatch) {
          var slotLevel = parseInt(slotMatch[1], 10);
          if (slotLevel >= 1 && slotLevel <= 9) {
            data.spells.rowMap.slots[slotLevel] = i;
            spellSlotsByLevel[slotLevel] = c;
          }
          continue;
        }

        if (spellMatch) {
          var spellLevel = parseInt(spellMatch[1], 10);
          if (spellLevel >= 1 && spellLevel <= 9) {
            data.spells.rowMap.spells[spellLevel] = i;
            spellListsByLevel[spellLevel] = c;
          }
        }
      }

      if (((cantripSpellText || "") + "").trim()) {
        data.spells.rows.push({ level: 0, slots: "", spells: cantripSpellText });
      }
      for (var spellLevelNum = 1; spellLevelNum <= 9; spellLevelNum++) {
        var rowSlots = (spellSlotsByLevel[spellLevelNum] || "");
        var rowSpells = (spellListsByLevel[spellLevelNum] || "");
        var hasSpellText = !!String(rowSpells).trim();
        var slotTrimmed = String(rowSlots).trim();
        var hasMeaningfulSlots = slotTrimmed !== "" && normalizeNonNegativeInt(slotTrimmed, 0) > 0;
        if (!hasSpellText && !hasMeaningfulSlots) continue;
        data.spells.rows.push({ level: spellLevelNum, slots: rowSlots, spells: rowSpells });
      }
      if (!data.spells.rows.length) {
        data.spells.rows.push({ level: 1, slots: "", spells: "" });
      }
      if (!data.spells.usesRows.length) {
        data.spells.usesRows.push({ uses: "", spells: "" });
      }
      if (data.spells.modeRowIndex === null || data.spells.modeRowIndex === undefined) {
        if (parsedUsesRowCount > 0) {
          data.spells.mode = "uses";
        }
      }

      return data;
    }

    function buildForm(data) {
      var root = document.getElementById("editor-form");
      var html = "";

      html += "<div class='section'><h2>1. Identity</h2>";
      html += "<div class='identity-name-wrap'>" + simpleField("Name", "name", data, false) + "</div>";
      html += "<div class='identity-class-wrap'>" + classEditorHtml(data) + "</div>";
      html += "<div class='grid-2 identity-size-race'>";
      html += simpleField("Size", "size", data, false, { selectOptions: DND_SIZE_OPTIONS });
      html += simpleField("Race / Type", "race", data, false, { placeholder: "Human" });
      html += simpleField("CR", "cr", data, false, { type: "cr", stepper: true, allowBlank: true, labelClass: "identity-cr-field" });
      html += "</div></div>";

      html += "<div class='section'><h2>2. Combat Stats</h2>";
      html += "<div class='combat-core'>";
      html += simpleField("AC", "ac", data, false, { type: "number", min: 0, step: 1, defaultValue: 10, stepper: true });
      html += simpleField("HP", "hp", data, false, { type: "number", min: 0, step: 1, defaultValue: 10, stepper: true });
      html += simpleField("Speed", "speed", data, false, { type: "number", min: 0, step: 1, defaultValue: 25, stepper: true });
      html += "</div>";
      html += speedVariantsEditorHtml(data);
      html += "</div>";

      html += "<div class='section'><h2>3. Defenses</h2>";
      html += "<h3>Damage</h3>";
      var damageMeta = getExpandableMeta(data.damage, "damage");
      html += "<div class='defense-subsection'>";
      html += "<div class='defense-list-head damage-list-head'>"
        + "  <div>Type</div>"
        + "  <div>Effect</div>"
        + "  <div>Roll Mod</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list damage-list'>";
      data.damage.forEach(function(row, i) {
        var hiddenClass = damageMeta.visible[i] ? "" : " is-hidden";
        html += damageRuleRowHtml(i, row, hiddenClass);
      });
      html += "</div>";
      html += renderAddRowButton("damage", "Add Damage Row", damageMeta.hiddenCount, true);
      html += "</div>";
      html += "<h3>Conditions</h3>";
      var conditionMeta = getExpandableMeta(data.conditions, "conditions");
      html += "<div class='defense-subsection'>";
      html += "<div class='defense-list-head condition-list-head'>"
        + "  <div>Condition</div>"
        + "  <div>Effect</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list condition-list'>";
      data.conditions.forEach(function(row, i) {
        var conditionHiddenClass = conditionMeta.visible[i] ? "" : " is-hidden";
        html += conditionRuleRowHtml(i, row, conditionHiddenClass);
      });
      html += "</div>";
      html += renderAddRowButton("conditions", "Add Condition Row", conditionMeta.hiddenCount, true);
      html += "</div>";
      html += "</div>";

      html += "<div class='section'><h2>4. Attributes</h2>";
      html += attributeMatrixHtml(data);
      html += "</div>";

      html += "<div class='section'><h2>5. Skills &amp; Senses</h2>";
      var proficiencyValue = data.simple["proficiency bonus"] ? data.simple["proficiency bonus"].value : "";
      var initiativeValue = data.simple["initiative"] ? data.simple["initiative"].value : "";
      var passiveRawValue = data.simple["passive perception"] ? data.simple["passive perception"].value : "";
      var passiveValue = String(normalizeNonNegativeInt(passiveRawValue, 10));
      var visionValue = data.simple["vision"] ? data.simple["vision"].value : "";
      html += "<div class='skills-summary-core'>"
        + "<label>Proficiency" + numberInput("field-proficiency-bonus", proficiencyValue, { min: 1, step: 1, allowBlank: true, stepper: true, defaultValue: 1, clearAtMinOnDecrement: true, extraClass: "skills-signed-input" }) + "</label>"
        + "<label>Initiative" + numberInput("field-initiative", initiativeValue, { step: 1, allowBlank: true, stepper: true, defaultValue: 0, sequence: "initiative", extraClass: "skills-signed-input" }) + "</label>"
        + "<label>Pass Perception" + numberInput("field-passive-perception", passiveValue, { min: 0, step: 1, allowBlank: true, stepper: true, defaultValue: 10, sequence: "passive-perception", extraClass: "skills-passive-input" }) + "</label>"
        + "</div>";
      html += "<div class='skills-vision-row'>"
        + "<label>Vision<input type='text' id='field-vision' class='skills-vision-input' value='" + escAttr(visionValue || "") + "' placeholder='e.g. 60dv, 10bs'></label>"
        + "</div>";
      html += "<h3>Skills</h3>";
      var skillMeta = getExpandableMeta(data.skills, "skills");
      html += "<div class='skills-subsection'>";
      html += "<div class='skills-list-head'>"
        + "  <div>Skill</div>"
        + "  <div>Mod</div>"
        + "  <div>Adv</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list skills-list'>";
      data.skills.forEach(function(skill, i) {
        var skillHiddenClass = skillMeta.visible[i] ? "" : " is-hidden";

    function parseClassEntries(rawClass) {
      var value = (rawClass || "").trim();
      if (!value) return [];

      return value.split("/").map(function(part) {
        var piece = part.trim();
        if (!piece) return null;
        var m = piece.match(/^(.*?)(?:\s+(\d+))?$/);
        if (!m) return { className: piece, level: "" };
        return {
          className: (m[1] || "").trim(),
          level: (m[2] || "").trim()
        };
      }).filter(function(x) { return !!x; });
    }

    function syncClassEditorRows() {

              updatePreview();

              syncClassHiddenField();

            classNameInput.onchange = function() {

    function buildClassValueFromForm() {
      var rowsWrap = document.getElementById("class-rows");
      if (!rowsWrap) return "";

      var parts = [];
      var rows = rowsWrap.querySelectorAll(".class-row");
      for (var i = 0; i < rows.length; i++) {

    function textInput(id, value, readOnly, options) {

    }

    function numberInput(id, value, opts) {
      var options = opts || {};
      var sequenceType = options.sequence || "";
      var isCrSequence = sequenceType === "cr";
      var isSpellLevelSequence = sequenceType === "spell-level";
      var isSpellUsesSequence = sequenceType === "spell-uses";
      var isSaveOverrideSequence = sequenceType === "save-override";
      var hasMin = options.min !== undefined;
      var minAttr = hasMin ? " min='" + escAttr(String(options.min)) + "'" : "";
      var stepAttr = options.step !== undefined ? " step='" + escAttr(String(options.step)) + "'" : "";
      var raw = ((value === undefined || value === null) ? "" : String(value)).trim();
      var fallback = options.defaultValue !== undefined ? options.defaultValue : (hasMin ? options.min : 0);
      var normalized = "";
      if (isCrSequence) {
        normalized = normalizeCrValue(raw);
      } else if (isSpellLevelSequence) {
        normalized = formatSpellLevelDisplay(parseSpellLevelValue(raw));
      } else if (isSpellUsesSequence) {
        normalized = formatSpellUsesDisplay(parseSpellUsesValue(raw));
      } else if (options.allowBlank && raw === "") {
        normalized = "";
      } else if (hasMin) {
        normalized = String(normalizeMinInt(raw, fallback, options.min));
      } else {
        var parsed = parseInt(String(raw || "").replace(/[^\d-]/g, ""), 10);
        if (isNaN(parsed)) parsed = fallback;
        normalized = String(parsed);
      }
      var idAttr = id ? " id='" + id + "'" : "";
      var readonlyAttr = options.readonly ? " readonly" : "";
      var disabledAttr = options.disabled ? " disabled" : "";
      var placeholderAttr = options.placeholder ? " placeholder='" + escAttr(String(options.placeholder)) + "'" : "";
      var clearAtMinAttr = options.clearAtMinOnDecrement ? " data-clear-at-min='true'" : "";
      var sequenceAttr = sequenceType ? " data-sequence='" + escAttr(sequenceType) + "'" : "";
      var saveStatAttr = isSaveOverrideSequence && options.saveOverrideStat ? " data-save-stat='" + escAttr(String(options.saveOverrideStat)) + "'" : "";
      var blankSeedAttr = options.blankSeed !== undefined ? " data-blank-seed='" + escAttr(String(options.blankSeed)) + "'" : "";
      var extraClass = options.extraClass ? (" " + options.extraClass) : "";
      var sequenceAsText = isCrSequence || isSpellLevelSequence || isSpellUsesSequence;
      var inputType = sequenceAsText ? "text" : "number";
      var inputMode = sequenceAsText ? "text" : "numeric";
      if (sequenceAsText) {
        minAttr = "";
        stepAttr = "";
      }
      var inputHtml = "<input type='" + inputType + "' class='num-input" + extraClass + "'" + idAttr
        + " value='" + escAttr(normalized) + "'" + minAttr + stepAttr + placeholderAttr + clearAtMinAttr + sequenceAttr + saveStatAttr + blankSeedAttr + " inputmode='" + inputMode + "'" + readonlyAttr + disabledAttr + ">";

      if (!options.stepper) return inputHtml;

      return "<div class='num-stepper' data-target='" + escAttr(id) + "'>"
        + "<button type='button' class='step-btn step-down' aria-label='Decrease'>-</button>"
        + inputHtml
        + "<button type='button' class='step-btn step-up' aria-label='Increase'>+</button>"
        + "</div>";
    }

    function initNumberSteppers(scopeEl) {
      var scope = scopeEl && scopeEl.querySelectorAll ? scopeEl : document;
      var steppers = scope.querySelectorAll(".num-stepper");
      for (var i = 0; i < steppers.length; i++) {
        (function(stepper) {
          if (stepper.getAttribute("data-stepper-bound") === "true") return;
          stepper.setAttribute("data-stepper-bound", "true");
          var input = stepper.querySelector(".num-input");
          var down = stepper.querySelector(".step-down");
          var up = stepper.querySelector(".step-up");
          if (!input || !down || !up) return;

          var holdStartTimer = null;
          var holdRepeatTimer = null;

          function clearHoldTimers() {
            if (holdStartTimer) {
              clearTimeout(holdStartTimer);
              holdStartTimer = null;
            }
            if (holdRepeatTimer) {
              clearInterval(holdRepeatTimer);
              holdRepeatTimer = null;
            }
          }

          function adjust(delta) {
            if (input.disabled || input.readOnly) return;
            var sequenceType = input.getAttribute("data-sequence") || "";
            if (sequenceType === "cr") {
              var currentCrIndex = crValueToIndex(input.value);
              var nextCrIndex = currentCrIndex;
              if (delta > 0) nextCrIndex = currentCrIndex <= 0 ? 1 : (currentCrIndex + 1);
              if (delta < 0) nextCrIndex = currentCrIndex <= 1 ? 0 : (currentCrIndex - 1);
              input.value = crIndexToValue(nextCrIndex);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            if (sequenceType === "spell-level") {
              var currentSpellLevel = parseSpellLevelValue(input.value);
              var nextSpellLevel = currentSpellLevel + delta;
              if (nextSpellLevel < 0) nextSpellLevel = 0;
              if (nextSpellLevel > 9) nextSpellLevel = 9;
              input.value = formatSpellLevelDisplay(nextSpellLevel);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            if (sequenceType === "spell-uses") {
              var currentUses = parseSpellUsesValue(input.value);
              var nextUses = currentUses;
              if (delta > 0) {
                if (currentUses === -1 || currentUses === "") nextUses = 1;
                else nextUses = parseInt(currentUses, 10) + 1;
              } else if (delta < 0) {
                if (currentUses === "" || currentUses === -1) nextUses = -1;
                else if (currentUses <= 1) nextUses = -1;
                else nextUses = parseInt(currentUses, 10) - 1;
              }
              input.value = formatSpellUsesDisplay(nextUses);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            if (sequenceType === "save-override") {
              var saveStat = input.getAttribute("data-save-stat") || "";
              var baseMod = 0;
              if (STATS.indexOf(saveStat) !== -1) {
                baseMod = dndModifier(getScoreValue(saveStat));
              }
              var rawSaveOverride = (input.value || "").trim();
              if (rawSaveOverride === "") {
                input.value = String(baseMod + (delta > 0 ? 1 : -1));
                input.dispatchEvent(new Event("input", { bubbles: true }));
                input.dispatchEvent(new Event("change", { bubbles: true }));
                return;
              }
              var currentSaveOverride = parseInt(String(rawSaveOverride).replace(/[^\d-]/g, ""), 10);
              if (isNaN(currentSaveOverride)) currentSaveOverride = baseMod;
              input.value = String(currentSaveOverride + delta);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            if (sequenceType === "initiative") {
              var rawInitiative = (input.value || "").trim();
              if (rawInitiative === "") {
                input.value = String(dndModifier(getScoreValue("dexterity")));
                input.dispatchEvent(new Event("input", { bubbles: true }));
                input.dispatchEvent(new Event("change", { bubbles: true }));
                return;
              }
              var currentInitiative = parseInt(String(rawInitiative).replace(/[^\d-]/g, ""), 10);
              if (isNaN(currentInitiative)) currentInitiative = dndModifier(getScoreValue("dexterity"));
              input.value = String(currentInitiative + delta);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            if (sequenceType === "passive-perception") {
              var rawPassive = (input.value || "").trim();
              if (rawPassive === "") {
                var seededPassive = 10 + dndModifier(getScoreValue("wisdom"));
                if (seededPassive < 0) seededPassive = 0;
                input.value = String(seededPassive);
                input.dispatchEvent(new Event("input", { bubbles: true }));
                input.dispatchEvent(new Event("change", { bubbles: true }));
                return;
              }
              var currentPassive = parseInt(String(rawPassive).replace(/[^\d-]/g, ""), 10);
              if (isNaN(currentPassive)) {
                currentPassive = 10 + dndModifier(getScoreValue("wisdom"));
                if (currentPassive < 0) currentPassive = 0;
              }
              var nextPassive = currentPassive + delta;
              if (nextPassive < 0) nextPassive = 0;
              input.value = String(nextPassive);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var minAttr = input.getAttribute("min");
            var hasMin = minAttr !== null && minAttr !== "";
            var min = hasMin ? parseInt(minAttr, 10) : 0;
            if (isNaN(min)) min = 0;
            var clearAtMin = input.getAttribute("data-clear-at-min") === "true";
            var blankSeedAttr = input.getAttribute("data-blank-seed");
            var raw = (input.value || "").trim();
            if (raw === "") {
              if (delta < 0 && clearAtMin) return;
              if (blankSeedAttr !== null && blankSeedAttr !== "") {
                var blankSeed = parseInt(blankSeedAttr, 10);
                if (!isNaN(blankSeed)) {
                  input.value = String(blankSeed);
                  input.dispatchEvent(new Event("input", { bubbles: true }));
                  input.dispatchEvent(new Event("change", { bubbles: true }));
                  return;
                }
              }
              input.value = String(hasMin ? min : 0);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var current = parseInt(String(raw).replace(/[^\d-]/g, ""), 10);
            if (isNaN(current)) current = hasMin ? min : 0;
            if (delta < 0 && clearAtMin && hasMin && current === min) {
              input.value = "";
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var next = current + delta;
            if (hasMin && next < min) next = min;
            input.value = String(next);
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.dispatchEvent(new Event("change", { bubbles: true }));
          }

          if (input.getAttribute("data-sequence") === "cr") {
            var normalizeCrInput = function() {
              var normalizedCr = normalizeCrValue(input.value);
              if (input.value !== normalizedCr) input.value = normalizedCr;

          if (input.getAttribute("data-sequence") === "spell-level") {

          function startHold(delta, ev) {

            adjust(delta);

          document.addEventListener("touchend", stopHold);

    function parseActionBracketRows(raw) {
      var text = ((raw || "") + "").trim();
      if (!text) return [];
      var rows = [];
      var match;
      var bracketRe = /\[\s*([^\]]+?)\s*\]/g;
      while ((match = bracketRe.exec(text))) {
        var token = (match[1] || "").trim();
        if (token) rows.push(token);
      }
      if (!rows.length) {
        var fallback = text.replace(/^\[+|\]+$/g, "").trim();
        if (fallback) rows.push(fallback);
      }
      return rows;
    }

    function parseActionDescriptionParts(raw) {
      var text = ((raw || "") + "").trim();
      var suffixRows = [];
      if (!text) return { descriptionHtml: "", suffixRows: suffixRows };

      var suffixTailMatch = text.match(/(?:\s*\[[^\[\]]+\]\s*)+$/);
      if (suffixTailMatch) {

        var match;
        var suffixRe = /\[\s*([^\]]+?)\s*\]/g;
        while ((match = suffixRe.exec(tail))) {
          var suffix = (match[1] || "").trim();
          if (suffix) suffixRows.push(suffix);
        }
        text = text.slice(0, text.length - tail.length).trim();
      }

      return { descriptionHtml: text, suffixRows: suffixRows };
    }

    function parseCommaSeparatedTags(raw) {
      var text = ((raw || "") + "").trim();
      if (!text) return [];
      var split = text.split(",");
      var tags = [];
      for (var i = 0; i < split.length; i++) {
        var cleaned = split[i].replace(/^\s*\[+/, "").replace(/\]+\s*$/, "").trim();
        if (cleaned) tags.push(cleaned);

      return tags;

    function formatBracketTagList(tags) {
      if (!tags || !tags.length) return "";
      return tags.map(function(tag) { return "[" + tag + "]"; }).join(" ");

      var suffixes = parseCommaSeparatedTags(getInputValue(prefix + "-" + index + "-suffixes"));
      var cost = formatBracketTagList(prefixes);
      var suffixTail = formatBracketTagList(suffixes);
      var descriptionWithSuffix = description + (suffixTail ? (description ? " " : "") + suffixTail : "");
      return {
        name: name,
        cost: cost,
        description: descriptionWithSuffix

    }

      var description = values.description;

      if (name) {
        var line = (cost ? escHtml(cost) + " " : "") + "<strong>" + escHtml(name) + ":</strong>";
        if (description) line += " " + description;
        return line;
      }
      if (cost) {

      }
      return description;

    function hasAnyValue(values) {

    function isExpandableRowFilled(row, rowType) {
      if (!row) return false;
      if (rowType === "movement") {
        return hasAnyValue([row.type, row.value]);
      }
      if (rowType === "damage" || rowType === "conditions") {
        return hasAnyValue([row.value, row.flag1, row.flag2]);
      }
      if (rowType === "skills") {
        return hasAnyValue([row.name, row.modifier, row.flag]);
      }
      if (rowType === "actions" || rowType === "bonusActions" || rowType === "reactions") {
        return hasAnyValue([row.cost, row.name, row.description]);
      }
      if (rowType === "special") {
        return hasAnyValue([row.text]) || String(row.newLine || "").toUpperCase() === "TRUE";
      }
      return false;
    }

    function getExpandableMeta(rows, rowType) {
      var list = rows || [];
      var visible = {};
      if (!list.length) return { visible: visible, hiddenCount: 0 };

      var filledIndexes = [];
      var emptyIndexes = [];
      for (var i = 0; i < list.length; i++) {
        if (isExpandableRowFilled(list[i], rowType)) filledIndexes.push(i);
        else emptyIndexes.push(i);
      }

      // Keep saved empties hidden by default when the section already has authored rows.
      // Otherwise, removed/cleared rows reappear after every reload as "new" blank rows.
      var targetVisible = filledIndexes.length > 0
        ? filledIndexes.length
        : Math.min(list.length, 1);
      var visibleCount = 0;
      for (var f = 0; f < filledIndexes.length; f++) {
        visible[filledIndexes[f]] = true;
        visibleCount++;
      }
      for (var e = 0; e < emptyIndexes.length && visibleCount < targetVisible; e++) {
        visible[emptyIndexes[e]] = true;
        visibleCount++;
      }

      return { visible: visible, hiddenCount: list.length - visibleCount };
    }

    function initExpandableSections() {

        var visibleRows = document.querySelectorAll(".expand-row.expand-" + sectionKey + ":not(.is-hidden)");

        for (var v = 0; v < visibleRows.length; v++) {

          if (!isNaN(visibleIdx) && visibleIdx > maxVisibleIndex) {

        var hiddenRows = document.querySelectorAll(".expand-row.expand-" + sectionKey + ".is-hidden");
        var bestHidden = null;
        var bestHiddenIndex = Number.POSITIVE_INFINITY;
        for (var h = 0; h < hiddenRows.length; h++) {
          var hiddenIdx = parseInt(hiddenRows[h].getAttribute("data-row-index"), 10);
          if (isNaN(hiddenIdx) || hiddenIdx <= maxVisibleIndex) continue;

          }

            var nextHidden = null;
            if (key === "special" || key === "actions" || key === "bonusActions" || key === "reactions") {
              nextHidden = getNextHiddenRowAfterVisible(key);
            } else {
              nextHidden = document.querySelector(".expand-row.expand-" + key + ".is-hidden");

            if (!nextHidden) {
              if (allowDynamicAdd && appendDynamicDefenseRow(key)) {
                btn.disabled = false;
                setDirty(true);
                updatePreview();

    function tryHideClearedRow(rowType, index) {

    function syncSpecialNewlineControls() {

      for (var i = 0; i < visibleRows.length; i++) {
        var checkbox = visibleRows[i].querySelector("input[type='checkbox'][id$='-newline']");
        if (!checkbox) continue;
        if (i === 0) {
          checkbox.checked = false;
          checkbox.disabled = true;
          checkbox.setAttribute("tabindex", "-1");
        } else {
          checkbox.disabled = false;
          checkbox.removeAttribute("tabindex");
        }
      }
    }

    function syncRepeatRowRemoveButtons(rowType) {

      var buttons = document.querySelectorAll(".row-remove-btn[data-row-remove='" + rowType + "']");
      var rows = document.querySelectorAll(".expand-row.expand-" + rowType);
      for (var r = 0; r < rows.length; r++) {
        rows[r].classList.remove("is-last-visible");
      }
      if (!buttons.length) return;

      var visibleRows = document.querySelectorAll(".expand-row.expand-" + rowType + ":not(.is-hidden)");
      if (visibleRows.length) {
        visibleRows[visibleRows.length - 1].classList.add("is-last-visible");

      var show = visibleRows.length > 1;
      for (var i = 0; i < buttons.length; i++) {

        if (show) buttons[i].removeAttribute("tabindex");

    function initRepeatableRowActions() {

              clearRepeatableRowValues(rowType, index);

              updatePreview();

      var clearButtons = document.querySelectorAll(".row-clear-btn[data-row-clear][data-row-index]");

      syncRepeatRowRemoveButtons("conditions");
      syncRepeatRowRemoveButtons("skills");
      syncRepeatRowRemoveButtons("actions");
      syncRepeatRowRemoveButtons("bonusActions");

    var richSelectionRanges = {};

    function normalizeRichFieldPlaceholderState(field) {

        var activePlain = (field.textContent || "").replace(/\u00a0/g, " ").trim();

          if (applyRichFieldHtmlPlaceholder(field)) return;
          field.classList.remove("is-rich-placeholder");

      var plain = (field.textContent || "").replace(/\u00a0/g, " ").trim();

      if (applyRichFieldHtmlPlaceholder(field)) return;

    function initRichTextFields() {
      var fields = document.querySelectorAll(".rt-field");
      for (var f = 0; f < fields.length; f++) {
        (function(field) {

          field.addEventListener("mouseup", function() { captureRichFieldSelection(field); });
          field.addEventListener("focus", function() {

            captureRichFieldSelection(field);
          });
