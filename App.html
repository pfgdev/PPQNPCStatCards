    function buildDraftRowsFromForm() {
      var rows = cloneRows(state.rawRows || []);
      applyFormEditsToRows(rows);
      return rows;
    }

    function applyFormEditsToRows(rows) {
      if (!state.parsedData) return;

      for (var i = 0; i < SIMPLE_KEYS.length; i++) {
        var key = SIMPLE_KEYS[i];
        if (!state.parsedData.simple[key]) {
          if (key === "cr") {
            rows.push(["CR", "", "", ""]);
            state.parsedData.simple[key] = { rowIndex: rows.length - 1, value: "", flag1: "", flag2: "" };
          } else {
            continue;
          }
        }
        var row = state.parsedData.simple[key].rowIndex;
        var inputId = "field-" + key.replace(/\s+/g, "-");
        if (RICH_SIMPLE_KEYS[key]) {
          setRichCellOnRows(rows, row, 1, inputId);
        } else {
          rows[row][1] = getPersistedSimpleValue(key);
        }
      }

      STATS.forEach(function(stat) {
        var saveKey = stat + " save";
        if (!state.parsedData.simple[saveKey]) return;
        var row = state.parsedData.simple[saveKey].rowIndex;
        rows[row][2] = getInputValue("field-" + stat + "-save-flag");
        rows[row][3] = "";
      });

      state.parsedData.damage.forEach(function(item, idx) {
        setCellOnRows(rows, item.rowIndex, 1, "damage-" + idx + "-value");
        setCellOnRows(rows, item.rowIndex, 2, "damage-" + idx + "-flag1");
        setCellOnRows(rows, item.rowIndex, 3, "damage-" + idx + "-flag2");
      });

      state.parsedData.conditions.forEach(function(item, idx) {
        setCellOnRows(rows, item.rowIndex, 1, "cond-" + idx + "-value");
        rows[item.rowIndex][2] = getInputValue("cond-" + idx + "-flag");
        rows[item.rowIndex][3] = "";
      });

      state.parsedData.skills.forEach(function(item, idx) {
        setCellOnRows(rows, item.rowIndex, 1, "skill-" + idx + "-name");
        var skillModRaw = getInputValue("skill-" + idx + "-mod");
        rows[item.rowIndex][2] = ((skillModRaw || "").trim() === "")
          ? ""
          : normalizeSignedValue(skillModRaw, "+0");
        setCellOnRows(rows, item.rowIndex, 3, "skill-" + idx + "-flag");
      });

      state.parsedData.actions.forEach(function(item, idx) {
        var actionValues = buildActionRowValues("act", idx);
        rows[item.rowIndex][1] = actionValues.cost;
        rows[item.rowIndex][2] = actionValues.name;
        rows[item.rowIndex][3] = actionValues.description;
      });

      state.parsedData.bonusActions.forEach(function(item, idx) {
        var bonusValues = buildActionRowValues("bonus", idx);
        rows[item.rowIndex][1] = bonusValues.cost;
        rows[item.rowIndex][2] = bonusValues.name;
        rows[item.rowIndex][3] = bonusValues.description;
      });

      state.parsedData.reactions.forEach(function(item, idx) {
        var reactionValues = buildActionRowValues("react", idx);
        rows[item.rowIndex][1] = reactionValues.cost;
        rows[item.rowIndex][2] = reactionValues.name;
        rows[item.rowIndex][3] = reactionValues.description;
      });

      if (state.parsedData.spells.cantrips) {
        setCellOnRows(rows, state.parsedData.spells.cantrips.rowIndex, 1, "spell-cantrips");
      }

      for (var level = 0; level < state.parsedData.spells.levels.length; level++) {
        var s = state.parsedData.spells.levels[level];
        if (!s) continue;
        var levelNumber = level + 1;
        if (s.slotsRowIndex !== undefined) setCellOnRows(rows, s.slotsRowIndex, 1, "spell-slots-" + levelNumber);
        if (s.spellsRowIndex !== undefined) setCellOnRows(rows, s.spellsRowIndex, 1, "spell-list-" + levelNumber);
      }

      state.parsedData.special.forEach(function(item, idx) {
        rows[item.rowIndex][1] = buildSpecialRowText(idx);
        var checkbox = document.getElementById("special-" + idx + "-newline");
        rows[item.rowIndex][2] = (checkbox && !checkbox.disabled && checkbox.checked) ? "TRUE" : "FALSE";
      });
    }

    function cloneRows(rows) {
      return (rows || []).map(function(r) {
        return [r[0] || "", r[1] || "", r[2] || "", r[3] || ""];
      });
    }

    function collectPreviewData() {
      var classValue = buildClassValueFromForm();
      var nameValue = getSimpleValue("name") || "--";
      var speedValues = getSpeedValuesFromVariants();
      var proficiencyRaw = getSimpleValue("proficiency bonus");
      var initiativeRaw = getSimpleValue("initiative");
      var passiveRaw = getSimpleValue("passive perception");
      var normalizedProficiency = normalizePositiveIntOrBlank(proficiencyRaw);
      var visionText = (getSimpleValue("vision") || "").trim();
      var crValue = normalizeCrValue(getSimpleValue("cr"));
      var data = {
        name: nameValue,
        classHtml: escHtml(classValue),
        class: classValue,
        size: getSimpleValue("size"),
        race: getSimpleValue("race"),
        cr: crValue,
        ac: String(getCoreStatValue("ac")),
        hp: String(getCoreStatValue("hp")),
        speed: String(getCoreStatValue("speed")),
        climb_speed: speedValues.climbSpeed,
        swim_speed: speedValues.swimSpeed,
        fly_speed: speedValues.flySpeed,
        strength: String(getScoreValue("strength")),
        strength_mod: formatSignedNumber(dndModifier(getScoreValue("strength"))),
        strength_save: getSaveDisplayValue("strength"),
        dexterity: String(getScoreValue("dexterity")),
        dexterity_mod: formatSignedNumber(dndModifier(getScoreValue("dexterity"))),
        dexterity_save: getSaveDisplayValue("dexterity"),
        constitution: String(getScoreValue("constitution")),
        constitution_mod: formatSignedNumber(dndModifier(getScoreValue("constitution"))),
        constitution_save: getSaveDisplayValue("constitution"),
        intelligence: String(getScoreValue("intelligence")),
        intelligence_mod: formatSignedNumber(dndModifier(getScoreValue("intelligence"))),
        intelligence_save: getSaveDisplayValue("intelligence"),
        wisdom: String(getScoreValue("wisdom")),
        wisdom_mod: formatSignedNumber(dndModifier(getScoreValue("wisdom"))),
        wisdom_save: getSaveDisplayValue("wisdom"),
        charisma: String(getScoreValue("charisma")),
        charisma_mod: formatSignedNumber(dndModifier(getScoreValue("charisma"))),
        charisma_save: getSaveDisplayValue("charisma"),
        damage: "",
        conditions: "",
        skills: {
          proficiency: normalizedProficiency ? formatSignedNumber(parseInt(normalizedProficiency, 10)) : "",
          initiative: normalizeSignedValue(initiativeRaw, "+0"),
          passive_perception: String(normalizeNonNegativeInt(passiveRaw, 10)),
          vision: visionText || "normal",
          skills: ""
        },
        back: {
          actions: "",
          bonus_actions: "",
          reactions: "",
          special: ""
        },
        spells: {
          spellsTitle: "",
          spellsString: ""
        }
      };

      var damageRows = [];
      state.parsedData.damage.forEach(function(item, idx) {
        var value = getInputValue("damage-" + idx + "-value");
        if (!value) return;
        damageRows.push(
          escHtml(value) +
          mapDefenseFlag(getInputValue("damage-" + idx + "-flag1")) +
          mapDefenseFlag(getInputValue("damage-" + idx + "-flag2"))
        );
      });
      data.damage = damageRows.length ? damageRows.join(", ") : "n/a";

      var conditionRows = [];
      state.parsedData.conditions.forEach(function(item, idx) {
        var value = getInputValue("cond-" + idx + "-value");
        if (!value) return;
        var condFlag = getInputValue("cond-" + idx + "-flag");
        conditionRows.push(
          escHtml(value) +
          mapDefenseFlag(condFlag)
        );
      });
      data.conditions = conditionRows.length ? conditionRows.join(", ") : "n/a";

      var skillRows = [];
      state.parsedData.skills.forEach(function(item, idx) {
        var skillName = getInputValue("skill-" + idx + "-name");
        var mod = getInputValue("skill-" + idx + "-mod");
        if (!skillName) return;
        var signedMod = ((mod || "").trim() === "") ? "" : normalizeSignedValue(mod, "+0");
        skillRows.push(
          abbreviateSkill(skillName) + (signedMod ? (" " + escHtml(signedMod)) : "") + mapSkillFlag(getInputValue("skill-" + idx + "-flag"))
        );
      });
      data.skills.skills = skillRows.join(", ");

      data.back.actions = buildActionBlockForPreview("act", state.parsedData.actions.length);
      data.back.bonus_actions = buildActionBlockForPreview("bonus", state.parsedData.bonusActions.length);
      data.back.reactions = buildActionBlockForPreview("react", state.parsedData.reactions.length);
      data.back.special = buildSpecialBlockForPreview();
      data.spells = buildSpellsPreview();

      return data;
    }

    function renderFrontPreview(cardData) {
      var frontEl = document.getElementById("preview-front");
      var subtitleBits = [];
      if (cardData.classHtml) subtitleBits.push(cardData.classHtml);
      var sizeRace = (cardData.size + " " + cardData.race).trim();
      if (sizeRace) subtitleBits.push(escHtml(sizeRace));
      if (cardData.cr) subtitleBits.push("CR " + escHtml(cardData.cr));
      var subtitle = subtitleBits.join(" &bull; ");

      frontEl.innerHTML = ""
        + "<div class='name'>" + escHtml(cardData.name) + "</div>"
        + "<div class='subtitle'>" + subtitle + "</div>"
        + "<div class='row'>"
        + "  <div class='unified-card'><div class='label'>AC</div><div class='value-row'><div class='primary-value'>" + escHtml(cardData.ac) + "</div></div></div>"
        + "  <div class='unified-card'><div class='label'>HP</div><div class='value-row'><div class='primary-value'>" + escHtml(cardData.hp) + "</div></div></div>"
        + "  <div class='unified-card'><div class='label'>SPD</div><div class='value-row'><div class='primary-value'>" + escHtml(cardData.speed) + "</div>" + renderMovementStack(cardData) + "</div></div>"
        + "</div>"
        + "<div class='block-title'>Defenses</div>"
        + "<div class='description-block'>"
        + "  <div><strong>Damage: </strong>" + (cardData.damage || "") + "</div>"
        + "  <div><strong>Conditions: </strong>" + (cardData.conditions || "") + "</div>"
        + "</div>"
        + "<div class='block-title'>Attributes</div>"
        + renderAttributesRows(cardData)
        + "<div class='block-title'>Skills &amp; Senses</div>"
        + "<div class='text-line'><strong>Proficiency Bonus:</strong> " + escHtml(cardData.skills.proficiency) + " &bull; <strong>Initiative:</strong> " + escHtml(cardData.skills.initiative) + "</div>"
        + "<div class='text-line'><strong>Passive Perception:</strong> " + escHtml(cardData.skills.passive_perception) + " &bull; <strong>Vision:</strong> " + escHtml(cardData.skills.vision) + "</div>"
        + "<div class='text-line'><strong>Skills:</strong> " + (cardData.skills.skills || "") + "</div>";
    }

    function renderBackPreview(cardData) {
      var backEl = document.getElementById("preview-back");
      var html = "<div class='subtitle' style='text-align:center;'>Combat Actions</div>";

      if (cardData.back.actions) {
        html += "<div class='block-title'>Actions</div><div class='text-line'>" + cardData.back.actions + "</div>";
      }
      if (cardData.back.bonus_actions) {
        html += "<div class='block-title'>Bonus Actions</div><div class='text-line'>" + cardData.back.bonus_actions + "</div>";
      }
      if (cardData.back.reactions) {
        html += "<div class='block-title'>Reactions</div><div class='text-line'>" + cardData.back.reactions + "</div>";
      }
      if (cardData.spells && cardData.spells.spellsString) {
        html += "<div class='block-title spells-line'><span class='spells-label'>Spells:</span><span class='spells-brackets'>" + cardData.spells.spellsTitle + "</span></div>";
        html += "<div class='text-line'>" + cardData.spells.spellsString + "</div>";
      }
      if (cardData.back.special) {
        html += "<div class='block-title'>Special</div><div class='text-line'>" + cardData.back.special + "</div>";
      }

      backEl.innerHTML = html;
    }

    function renderAttributesRows(cardData) {
      return ""
        + "<div class='row'>"
        + renderAttributeCell("STR", cardData.strength, cardData.strength_mod, cardData.strength_save)
        + renderAttributeCell("DEX", cardData.dexterity, cardData.dexterity_mod, cardData.dexterity_save)
        + renderAttributeCell("CON", cardData.constitution, cardData.constitution_mod, cardData.constitution_save)
        + "</div>"
        + "<div class='row'>"
        + renderAttributeCell("INT", cardData.intelligence, cardData.intelligence_mod, cardData.intelligence_save)
        + renderAttributeCell("WIS", cardData.wisdom, cardData.wisdom_mod, cardData.wisdom_save)
        + renderAttributeCell("CHA", cardData.charisma, cardData.charisma_mod, cardData.charisma_save)
        + "</div>";
    }

    function renderAttributeCell(label, score, mod, save) {
      var saveParts = splitSaveFlag(save);
      return ""
        + "<div class='unified-card'>"
        + "  <div class='label'>" + label + " " + escHtml(score) + "</div>"
        + "  <div class='value-row'>"
        + "    <div class='primary-value'>" + escHtml(mod) + "</div>"
        + "    <div class='secondary-stack'><div>" + saveParts.base + "sv" + saveParts.flag + "</div></div>"
        + "  </div>"
        + "</div>";
    }

    function renderMovementStack(cardData) {
      if (!cardData.climb_speed && !cardData.swim_speed && !cardData.fly_speed) return "";

      var parts = [];
      if (cardData.climb_speed) parts.push("<div>" + escHtml(cardData.climb_speed) + "c</div>");
      if (cardData.swim_speed) parts.push("<div>" + escHtml(cardData.swim_speed) + "s</div>");
      if (cardData.fly_speed) parts.push("<div>" + escHtml(cardData.fly_speed) + "f</div>");
      return "<div class='secondary-stack'>" + parts.join("") + "</div>";
    }

    function splitSaveFlag(saveValue) {
      var raw = saveValue || "";
      var match = raw.match(/([\u25B2\u25BC])$/);
      var base = raw.replace(/([\u25B2\u25BC])$/, "");
      return { base: escHtml(base), flag: match ? match[1] : "" };
    }

    function buildActionBlockForPreview(prefix, count) {
      var rows = [];
      for (var i = 0; i < count; i++) {
        var actionValues = buildActionRowValues(prefix, i);
        if (!actionValues.name) continue;
        var line = (actionValues.cost ? escHtml(actionValues.cost) + " " : "") + "<strong>" + escHtml(actionValues.name) + ":</strong>";
        if (actionValues.description) line += " " + actionValues.description;
        rows.push(line);
      }
      return rows.join("<br>");
    }

    function buildSpecialBlockForPreview() {
      var rows = [];
      for (var i = 0; i < state.parsedData.special.length; i++) {
        var text = buildSpecialRowText(i);
        if (!text) continue;
        var newLine = document.getElementById("special-" + i + "-newline");
        var forceNewLine = newLine && !newLine.disabled && newLine.checked;
        if (rows.length === 0 || forceNewLine) {
          rows.push(text);
        } else {
          rows[rows.length - 1] += " &bull; " + text;
        }
      }
      return rows.join("<br>");
    }

    function buildSpellsPreview() {
      var slots = new Array(9).fill("0");
      var spells = new Array(9).fill("");

      var cantripRaw = getInputValue("spell-cantrips");
      for (var level = 1; level <= 9; level++) {
        var slotEl = document.getElementById("spell-slots-" + level);
        var spellEl = document.getElementById("spell-list-" + level);
        if (slotEl) slots[level - 1] = slotEl.value.trim() || "0";
        if (spellEl) spells[level - 1] = spellEl.value.trim();
      }

      function italicizeSpellList(raw) {
        if (!raw) return "";
        return raw.split(",").map(function(part) {
          return "<i>" + escHtml(part.trim()) + "</i>";
        }).join(", ");
      }

      var cantrips = italicizeSpellList(cantripRaw);
      var spellLines = spells.map(italicizeSpellList);

      var highestLevel = 0;
      for (var i = 0; i < 9; i++) {
        if (spellLines[i]) highestLevel = i + 1;
      }

      var groupsToShow = Math.ceil(Math.max(highestLevel, 1) / 3);
      var groups = [slots.slice(0, 3), slots.slice(3, 6), slots.slice(6, 9)];
      var bracketed = [];
      for (var g = 0; g < groupsToShow; g++) {
        bracketed.push("[" + groups[g].join("/") + "]");
      }

      var lines = [];
      if (cantrips) lines.push("<strong>[C]</strong> " + cantrips);
      for (var groupIndex = 0; groupIndex < 3; groupIndex++) {
        var groupLabels = [];
        for (var offset = 0; offset < 3; offset++) {
          var idx = groupIndex * 3 + offset;
          if (spellLines[idx]) {
            groupLabels.push("<strong>[" + (idx + 1) + "]</strong> " + spellLines[idx]);
          }
        }
        if (groupLabels.length) lines.push(groupLabels.join(" "));
      }

      return {
        spellsTitle: bracketed.join(" "),
        spellsString: lines.join("<br>")
      };
    }

    function getSimpleValue(key) {
      return getInputValue("field-" + key.replace(/\s+/g, "-"));
    }

    function getSpeedValuesFromVariants() {
      var values = { climbSpeed: "", swimSpeed: "", flySpeed: "" };
      for (var i = 1; i <= 2; i++) {
        var type = getInputValue("speed-variant-" + i + "-type");
        var raw = getInputValue("speed-variant-" + i + "-value");
        if (!type || !raw) continue;
        var normalized = String(normalizeNonNegativeInt(raw, getCoreStatValue("speed")));
        if (type === "Climb") values.climbSpeed = normalized;
        if (type === "Swim") values.swimSpeed = normalized;
        if (type === "Fly") values.flySpeed = normalized;
      }
      return values;
    }

    function getCoreStatValue(key) {
      var defaults = { ac: 10, hp: 10, speed: 25 };
      return normalizeNonNegativeInt(getSimpleValue(key), defaults[key] || 0);
    }

    function normalizeCrValue(raw) {
      var text = String(raw || "").trim();
      if (!text) return "";
      text = text.replace(/^cr\s*/i, "").trim();
      if (!text) return "";
      var compact = text.replace(/\s+/g, "");
      if (compact === "0") return "";
      if (compact === "1/8" || compact === "1/4" || compact === "1/2") return compact;
      if (/^\d+$/.test(compact)) {
        var n = parseInt(compact, 10);
        return n > 0 ? String(n) : "";
      }
      if (/^\d*\.?\d+$/.test(compact)) {
        var numeric = parseFloat(compact);
        if (Math.abs(numeric - 0.125) < 0.000001) return "1/8";
        if (Math.abs(numeric - 0.25) < 0.000001) return "1/4";
        if (Math.abs(numeric - 0.5) < 0.000001) return "1/2";
        if (numeric >= 1 && Math.floor(numeric) === numeric) return String(numeric);
      }
      return "";
    }

    function crValueToIndex(raw) {
      var normalized = normalizeCrValue(raw);
      if (!normalized) return 0;
      if (normalized === "1/8") return 1;
      if (normalized === "1/4") return 2;
      if (normalized === "1/2") return 3;
      var integerValue = parseInt(normalized, 10);
      if (isNaN(integerValue) || integerValue <= 0) return 0;
      return integerValue + 3;
    }

    function crIndexToValue(index) {
      var idx = parseInt(index, 10);
      if (isNaN(idx) || idx <= 0) return "";
      if (idx === 1) return "1/8";
      if (idx === 2) return "1/4";
      if (idx === 3) return "1/2";
      return String(idx - 3);
    }

    function getPersistedSimpleValue(key) {
      if (key === "name") {
        var safeName = getSimpleValue("name");
        return safeName ? safeName : "--";
      }
      if (key === "class") {
        return buildClassValueFromForm();
      }
      if (key === "cr") {
        return normalizeCrValue(getSimpleValue("cr"));
      }
      if (key === "ac" || key === "hp" || key === "speed") {
        return String(getCoreStatValue(key));
      }
      if (key === "proficiency bonus") {
        var normalizedProficiency = normalizePositiveIntOrBlank(getSimpleValue(key));
        return normalizedProficiency ? formatSignedNumber(parseInt(normalizedProficiency, 10)) : "";
      }
      if (key === "initiative") {
        return normalizeSignedValue(getSimpleValue(key), "+0");
      }
      if (key === "passive perception") {
        return String(normalizeNonNegativeInt(getSimpleValue(key), 10));
      }
      if (key === "climb speed" || key === "swim speed" || key === "fly speed") {
        var speedValues = getSpeedValuesFromVariants();
        if (key === "climb speed") return speedValues.climbSpeed;
        if (key === "swim speed") return speedValues.swimSpeed;
        if (key === "fly speed") return speedValues.flySpeed;
      }
      if (STATS.indexOf(key) !== -1) {
        return String(getScoreValue(key));
      }
      if (/\smod$/.test(key)) {
        var statForMod = key.replace(/\smod$/, "");
        return formatSignedNumber(dndModifier(getScoreValue(statForMod)));
      }
      if (/\ssave$/.test(key)) {
        return normalizeSignedValue(getSimpleValue(key), "+0");
      }
      return getSimpleValue(key);
    }

    function getScoreValue(stat) {
      return normalizeNonNegativeInt(getSimpleValue(stat), 10);
    }

    function getSaveDisplayValue(stat) {
      var raw = getSimpleValue(stat + " save");
      var base = normalizeSignedValue(raw, "+0");
      var flag = getInputValue("field-" + stat + "-save-flag");
      return base + mapSkillFlag(flag);
    }

    function dndModifier(score) {
      return Math.floor((score - 10) / 2);
    }

    function formatSignedNumber(num) {
      var n = parseInt(num, 10);
      if (isNaN(n)) n = 0;
      return n >= 0 ? "+" + n : String(n);
    }

    function normalizeSignedValue(raw, defaultValue) {
      var fallback = defaultValue !== undefined ? defaultValue : "+0";
      var parsed = parseInt(String(raw || "").replace(/[^\d+-]/g, ""), 10);
      if (isNaN(parsed)) return fallback;
      return formatSignedNumber(parsed);
    }

    function normalizeNonNegativeInt(raw, fallback) {
      var n = parseInt(String(raw || "").replace(/[^\d-]/g, ""), 10);
      if (isNaN(n)) return fallback;
      if (n < 0) return 0;
      return n;
    }

    function normalizeMinInt(raw, fallback, minValue) {
      var min = minValue !== undefined ? minValue : 0;
      var n = parseInt(String(raw || "").replace(/[^\d-]/g, ""), 10);
      if (isNaN(n)) return fallback;
      if (n < min) return min;
      return n;
    }

    function normalizePositiveIntOrBlank(raw) {
      var n = parseInt(String(raw || "").replace(/[^\d-]/g, ""), 10);
      if (isNaN(n) || n < 1) return "";
      return String(n);
    }

    function getRichOrSimpleValue(key) {
      var id = "field-" + key.replace(/\s+/g, "-");
      return RICH_SIMPLE_KEYS[key] ? getRichValue(id) : getInputValue(id);
    }

    function getInputValue(id) {
      var el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function getRichValue(id) {
      var el = document.getElementById(id);
      return el ? normalizeRichHtml(el.innerHTML) : "";
    }

    function mapDefenseFlag(flag) {
      if (flag === "Resistance") return " <b>\u24C7</b>";
      if (flag === "Vulnerability") return " <b>\u24CB</b>";
      if (flag === "Immunity") return " <b>\u24D8</b>";
      if (flag === "Advantage") return "\u25B2";
      if (flag === "Disadvantage") return "\u25BC";
      return "";
    }

    function mapSkillFlag(flag) {
      if (flag === "Advantage") return "\u25B2";
      if (flag === "Disadvantage") return "\u25BC";
      return "";
    }

    function abbreviateSkill(skillName) {
      if (SKILL_ABBREV[skillName]) return SKILL_ABBREV[skillName];
      var plain = (skillName || "").trim();
      if (!plain) return "";
      return escHtml(plain.slice(0, 3));
    }

    function saveNpc() {
      if (!state.currentSheetName || !state.rawRows || !state.parsedData) return;

      var saveBtn = document.getElementById("save-btn");
      saveBtn.disabled = true;
      setStatus("Saving " + state.currentSheetName + "...", "");

      try {
        var draftRows = buildDraftRowsFromForm();

        google.script.run
          .withSuccessHandler(function() {
            state.rawRows = draftRows;
            saveBtn.disabled = false;
            setDirty(false);
            updatePreview();
          })
          .withFailureHandler(function(err) {
            saveBtn.disabled = false;
            setStatus("Save failed: " + (err && err.message ? err.message : err), "error");
          })
          .webApp_saveData(state.currentSheetName, draftRows);
      } catch (err) {
        saveBtn.disabled = false;
        setStatus("Save failed: " + (err && err.message ? err.message : err), "error");
      }
    }

    function printCurrentNpc() {
      if (!state.currentSheetName || !state.parsedData) return;
      var cardData = collectPreviewData();
      var printWindow = window.open("", "_blank");
      if (!printWindow) {
        setStatus("Pop-up blocked. Allow pop-ups to print.", "warn");
        return;
      }
      printWindow.document.write("<p style='font-family:Arial,sans-serif;padding:16px;'>Rendering print view...</p>");

      google.script.run
        .withSuccessHandler(function(html) {
          printWindow.document.open();
          printWindow.document.write(html || "");
          printWindow.document.close();
        })
        .withFailureHandler(function(err) {
          printWindow.document.open();
          printWindow.document.write("<p style='font-family:Arial,sans-serif;padding:16px;color:#b00020;'>Print render failed: "
            + escHtml((err && err.message ? err.message : err) + "") + "</p>");
          printWindow.document.close();
        })
        .webApp_renderPrintHtmlFromCardData(cardData);
    }

    function setCellOnRows(rows, rowIndex, colIndex, inputId) {
      var el = document.getElementById(inputId);
      if (!el) return;
      rows[rowIndex][colIndex] = el.value;
    }

    function setRichCellOnRows(rows, rowIndex, colIndex, fieldId) {
      var el = document.getElementById(fieldId);
      if (!el) return;
      rows[rowIndex][colIndex] = normalizeRichHtml(el.innerHTML);
    }

    function normalizeRichHtml(html) {
      return (html || "")
        .replace(/<div><br><\/div>/gi, "<br>")
        .replace(/<\/div><div>/gi, "<br>")
        .replace(/<div>/gi, "")
        .replace(/<\/div>/gi, "")
        .replace(/&nbsp;/g, " ")
        .trim();
    }

    function escHtml(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escAttr(str) {
      return (str || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
