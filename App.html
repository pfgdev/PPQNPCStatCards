<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PPQ NPC Builder</title>
  <style>
    :root {
      --bg: #f3f4f8;
      --panel: #ffffff;
      --ink: #1a1d24;
      --muted: #5d6574;
      --line: #d7dce8;
      --primary: #0f5da8;
      --primary-strong: #094882;
      --success: #127f39;
      --warn: #b16f00;
      --danger: #ba1f33;
      --shadow: 0 10px 30px rgba(20, 31, 56, 0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --field-ch: 30ch;
      --space-1: 4px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 10px;
      --space-5: 12px;
      --space-6: 16px;
      --field-h: 32px;
      --field-pad-x: 8px;
      --surface-soft: #fbfdff;
      --row-action-w: 68px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% -20%, #fdf7df 0%, #f3f4f8 35%, #eef2f8 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100vh;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(120deg, #ffffff 0%, #f7f9fd 55%, #fff9e9 100%);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    #status {
      font-size: 13px;
      color: var(--muted);
      text-align: right;
      max-width: 440px;
    }

    #status.ok { color: var(--success); }
    #status.warn { color: var(--warn); }
    #status.error { color: var(--danger); }

    .view {
      display: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .view.active { display: block; }

    .home-wrap {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .home-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .home-title {
      margin: 0;
      font-size: 18px;
    }

    .home-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .home-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .npc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .npc-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%);
      padding: 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .npc-card:hover {
      transform: translateY(-2px);
      border-color: #7fa7d5;
      box-shadow: 0 8px 20px rgba(15, 93, 168, 0.12);
    }

    .npc-card h3 {
      margin: 0;
      font-size: 15px;
      color: #123761;
    }

    .npc-card p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .npc-card.new-card {
      border-style: dashed;
      border-color: #8cb2df;
      background: linear-gradient(120deg, #f5f9ff 0%, #ffffff 100%);
    }

    .npc-card.new-card h3 {
      color: #0f5da8;
    }

    .empty-note {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: #fbfcff;
    }

    .editor-wrap {
      display: flex;
      flex-direction: column;
      min-height: 70vh;
    }

    .editor-toolbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--line);
      background: #ffffffee;
      backdrop-filter: blur(6px);
      padding: 8px 12px;
    }

    #editor-title {
      margin-right: auto;
      font-weight: 700;
      color: #1a3c66;
    }

    .editor-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: var(--space-4);
      align-items: start;
      padding: var(--space-4);
    }

    .editor-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      min-width: 0;
    }

    .preview-pane {
      position: sticky;
      top: 56px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbff;
      padding: var(--space-3);
    }

    .preview-title {
      margin: 0 0 8px;
      font-size: 12px;
      color: #4f5d72;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .preview-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .preview-frame {
      width: 100%;
      border: 1px solid #d8dfea;
      border-radius: 8px;
      padding: 6px;
      background: #eef4ff;
      display: flex;
      justify-content: center;
    }

    .preview-label {
      margin: 0 0 6px;
      font-size: 11px;
      color: #5b6b81;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 600;
    }

    .card-preview {
      font-family: Arial, sans-serif;
      width: 2.5in;
      height: 3.5in;
      background: #fff;
      border-radius: 6px;
      padding: 6px;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    .card-preview .name {
      font-size: 22px;
      font-weight: bold;
      width: 100%;
      text-align: left;
    }

    .card-preview .subtitle {
      font-size: 11px;
      font-style: italic;
      color: #555;
      width: 100%;
      text-align: left;
      margin-bottom: 4px;
      white-space: normal;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .card-preview .row {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 2px;
    }

    .card-preview .unified-card {
      flex: 1;
      background: #f0f0f0;
      border-radius: 4px;
      padding: 4px;
      margin: 0 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: auto;
    }

    .card-preview .label {
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 1px;
      color: #111;
      text-transform: none;
      letter-spacing: 0;
    }

    .card-preview .value-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card-preview .primary-value {
      font-size: 18px;
      font-weight: bold;
    }

    /* Keep stat tiles stable while editing empty values without forcing larger cards. */
    .card-preview .primary-value:empty::before {
      content: "\00a0";
    }

    .card-preview .secondary-stack {
      display: flex;
      flex-direction: column;
      font-size: 10px;
      line-height: 1;
      text-align: left;
      min-width: 20px;
      justify-content: center;
    }

    .card-preview .block-title {
      width: 100%;
      text-align: left;
      font-weight: bold;
      margin: 4px 0 2px;
      font-size: 12px;
      border-bottom: 1px solid #ccc;
    }

    .card-preview .text-line {
      width: 100%;
      font-size: 10px;
      line-height: 1.2;
    }

    .card-preview .description-block {
      width: 100%;
      margin: 2px 0 4px 0;
      font-size: 10px;
      line-height: 1.2;
    }

    .card-preview .description-block strong {
      font-weight: bold;
    }

    .card-preview .spells-line {
      position: relative;
    }

    .card-preview .spells-brackets {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: var(--space-4);
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .section h2 {
      margin: 0;
      font-size: 14px;
      color: #163b63;
      letter-spacing: 0.15px;
    }

    .section h3 {
      margin: var(--space-2) 0 var(--space-1);
      font-size: 11px;
      font-weight: 600;
      color: #546173;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #e9edf5;
      padding-bottom: 3px;
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: var(--space-3); }
    .grid-stat { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: var(--space-3); }
    .identity-name-wrap { max-width: 30ch; }
    .identity-name-wrap > label {
      font-size: 10px;
      color: #304b6b;
      letter-spacing: 0.45px;
    }
    .identity-name-wrap > label > input[type="text"] {
      width: min(100%, 27ch);
      min-height: 36px;
      font-size: 18px;
      font-weight: 700;
      color: #173657;
      letter-spacing: 0.2px;
    }
    .identity-class-wrap { max-width: 100%; margin-top: var(--space-1); }
    .identity-size-race {
      max-width: 38ch;
      grid-template-columns: 132px minmax(0, 1fr);
      align-items: end;
    }
    .combat-core {
      display: grid;
      grid-template-columns: repeat(3, minmax(108px, 120px));
      gap: var(--space-2);
      align-items: start;
      justify-content: start;
    }
    .combat-core > label {
      align-items: center;
    }
    .speed-variants {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 0;
      max-width: 100%;
      width: max-content;
      padding-left: 0;
      border-left: 0;
    }
    .movement-kicker {
      margin: 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #627287;
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .movement-list-head,
    .movement-row {
      display: grid;
      grid-template-columns: 132px 90px 56px;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .movement-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .movement-list-head > div:nth-child(2),
    .movement-list-head > div:nth-child(3) {
      text-align: center;
    }
    .movement-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .movement-row select,
    .movement-row .num-stepper {
      width: 100%;
      max-width: 100%;
    }
    .movement-row .num-stepper {
      max-width: 90px;
    }
    .movement-row .row-remove-btn {
      justify-self: center;
    }
    .movement-list + .section-add-row {
      margin-top: var(--space-2);
    }

    .repeat-row {
      border: 1px solid #e5ebf5;
      border-radius: var(--radius-sm);
      background: var(--surface-soft);
      padding: var(--space-2);
    }

    .repeat-inline {
      display: grid;
      align-items: end;
      justify-content: stretch;
      width: 100%;
      margin-bottom: var(--space-2);
    }

    .flag-row {
      grid-template-columns: minmax(20ch, 1.7fr) minmax(14ch, 1fr) minmax(13ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .condition-row {
      grid-template-columns: minmax(20ch, 1.8fr) minmax(14ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .skill-row {
      grid-template-columns: minmax(18ch, 1.5fr) minmax(9ch, 0.75fr) minmax(12ch, 1fr) var(--row-action-w);
      gap: var(--space-3);
    }
    .spell-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .defense-subsection {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .defense-subsection > .section-add-row {
      margin-top: var(--space-2);
    }
    .defense-list-head,
    .damage-row,
    .condition-rule-row {
      display: grid;
      gap: var(--space-2);
      align-items: center;
      width: max-content;
    }
    .damage-list-head,
    .damage-row {
      grid-template-columns: 154px 128px 112px 56px;
    }
    .condition-list-head,
    .condition-rule-row {
      grid-template-columns: 154px 128px 56px;
    }
    .defense-list-head {
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .damage-list-head > div:last-child,
    .condition-list-head > div:last-child {
      text-align: center;
    }
    .damage-row,
    .condition-rule-row {
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }
    .damage-row select,
    .condition-rule-row select {
      width: 100%;
      max-width: 100%;
    }
    .damage-row .row-remove-btn,
    .condition-rule-row .row-remove-btn {
      justify-self: center;
    }

    .attr-matrix {
      border: 1px solid #dbe5f4;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: #fff;
      width: max-content;
      max-width: 100%;
    }
    .attr-matrix-head,
    .attr-matrix-row {
      display: grid;
      grid-template-columns: 52px 90px 62px 90px 170px;
      gap: var(--space-2);
      align-items: center;
      padding: 5px 8px;
    }
    .attr-matrix-head {
      background: #f2f6fd;
      border-bottom: 1px solid #dbe5f4;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .attr-matrix-row {
      border-bottom: 1px solid #edf2fa;
    }
    .attr-matrix-row:nth-child(even) {
      background: #fbfdff;
    }
    .attr-matrix-row:last-child {
      border-bottom: 0;
    }
    .attr-matrix-head > div:nth-child(2),
    .attr-matrix-head > div:nth-child(3),
    .attr-matrix-head > div:nth-child(4),
    .attr-matrix-head > div:nth-child(5) {
      text-align: center;
    }
    .attr-stat-cell {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #1f3f63;
    }
    .attr-matrix-row .num-input,
    .attr-matrix-row input[type="text"],
    .attr-matrix-row select {
      width: auto;
    }
    .attr-matrix-row .num-input,
    .attr-matrix-row .attr-save-input { text-align: center; }
    .attr-matrix-row > div {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .attr-matrix-row > div:first-child {
      justify-content: flex-start;
    }
    .attr-matrix-row > div:nth-child(5) select {
      width: 16.8ch;
      max-width: 100%;
    }
    .attr-score-input,
    .attr-save-input {
      width: 100%;
      min-width: 0;
      max-width: 100%;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.15px;
    }
    .attr-matrix-row .num-stepper {
      width: 100%;
      max-width: 90px;
      min-width: 0;
    }
    .attr-derived-text {
      color: #5a6778;
      font-weight: 600;
      width: 62px;
      min-width: 62px;
      max-width: 62px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.1px;
      line-height: 1.2;
    }
    .expand-row.is-hidden { display: none; }
    .section-add-row {
      margin-top: var(--space-1);
      display: flex;
      justify-content: flex-start;
    }

    .add-row-btn {
      min-height: 26px;
      padding: 0 9px;
      border-radius: 7px;
      font-size: 11px;
    }
    .action-row {
      margin-bottom: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .action-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--row-action-w);
      gap: var(--space-3);
      align-items: end;
    }
    .action-top {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: var(--space-3);
      align-items: end;
      margin: 0;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      font-size: 11px;
      color: #4d596b;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      font-weight: 600;
      align-items: flex-start;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      border: 1px solid #cfd7e6;
      border-radius: var(--radius-sm);
      min-height: var(--field-h);
      padding: 5px var(--field-pad-x);
      font-size: 14px;
      color: var(--ink);
      background: #fff;
      font-family: inherit;
    }

    label > input[type="text"],
    label > select,
    label > textarea {
      width: min(100%, var(--field-ch));
    }

    input[type="number"] {
      width: min(100%, 11ch);
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus,
    .rt-field:focus {
      outline: none;
      border-color: #3f7ec0;
      box-shadow: 0 0 0 3px rgba(63, 126, 192, 0.12);
    }

    .class-editor {
      --class-col-name-w: 188px;
      --class-col-level-w: 90px;
      --class-col-remove-w: 56px;
      border: none;
      background: transparent;
      padding: 0;
      margin-top: var(--space-1);
      max-width: 100%;
    }

    .row-editor-list {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      width: max-content;
      max-width: 100%;
      border: 1px solid #dbe5f4;
      border-top: 0;
      border-radius: 0 0 7px 7px;
      overflow: hidden;
    }

    .class-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .class-label {
      font-size: 11px;
      color: #4a5e78;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      font-weight: 700;
    }

    .class-add-btn,
    .class-remove-btn {
      padding: 0 8px;
      min-height: 24px;
      border-radius: 7px;
      font-size: 11px;
    }

    .class-remove-btn,
    .row-remove-btn {
      width: 24px;
      min-width: 24px;
      max-width: 24px;
      height: 24px;
      max-height: 24px;
      min-height: 24px;
      padding: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      border-color: #dde5f1;
      background: #fff;
      color: #667487;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .class-remove-btn:hover,
    .row-remove-btn:hover {
      background: #f5f8fc;
      color: #445973;
    }

    .class-footer {
      margin-top: var(--space-1);
      margin-bottom: var(--space-2);
      display: flex;
      justify-content: flex-start;
    }
    .class-footer .class-add-btn {
      min-height: 24px;
    }

    .class-row {
      display: grid;
      grid-template-columns: var(--class-col-name-w) var(--class-col-level-w) var(--class-col-remove-w);
      gap: var(--space-2);
      align-items: center;
      width: max-content;
      border: 0;
      border-bottom: 1px solid #edf2fa;
      border-radius: 0;
      padding: 3px 6px;
    }

    .row-editor-list .row-editor-row:nth-child(odd) {
      background: #fbfdff;
    }
    .row-editor-list .row-editor-row:nth-child(even) {
      background: #ffffff;
    }
    .row-editor-list .row-editor-row:last-child {
      border-bottom: 0;
    }

    .class-list-head {
      display: grid;
      grid-template-columns: var(--class-col-name-w) var(--class-col-level-w) var(--class-col-remove-w);
      gap: var(--space-2);
      align-items: center;
      width: max-content;
      max-width: 100%;
      padding: 4px 6px;
      background: #f2f6fd;
      border: 1px solid #dbe5f4;
      border-bottom: 1px solid #dbe5f4;
      border-radius: 7px 7px 0 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #5d6e84;
      font-weight: 700;
    }
    .class-list-head > div:nth-child(2),
    .class-list-head > div:nth-child(3) {
      text-align: center;
    }

    .class-row .class-name-input,
    .class-row .class-level-input {
      width: 100%;
    }
    .class-row .class-name-input {
      max-width: 100%;
    }
    .class-row .class-level-input {
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .num-input {
      -moz-appearance: textfield;
    }

    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .num-stepper {
      display: inline-grid;
      grid-template-columns: 28px minmax(0, 1fr) 28px;
      align-items: center;
      width: 116px;
      height: var(--field-h);
      border: 1px solid #b9c7dc;
      border-radius: var(--radius-sm);
      background: #fff;
      overflow: hidden;
    }

    .num-stepper:focus-within {
      border-color: #3f7ec0;
      box-shadow: 0 0 0 3px rgba(63, 126, 192, 0.12);
    }

    .num-stepper .step-btn {
      width: 100%;
      height: 100%;
      padding: 0;
      border: 0;
      background: #eef3fb;
      color: #1f4670;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      user-select: none;
    }

    .num-stepper .step-down {
      border-right: 1px solid #cdd8ea;
    }

    .num-stepper .step-up {
      border-left: 1px solid #cdd8ea;
    }

    .num-stepper .step-btn:hover {
      background: #e3ecfa;
    }

    .num-stepper .num-input {
      width: 100%;
      min-width: 0;
      height: 100%;
      border: 0;
      border-radius: 0;
      text-align: center;
      padding: 0 6px;
      -moz-appearance: textfield;
    }

    .num-stepper .num-input:focus {
      box-shadow: none;
      outline: none;
    }

    .num-stepper .num-input::-webkit-outer-spin-button,
    .num-stepper .num-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .row-action-btn {
      width: 100%;
      min-height: 28px;
      padding: 0 8px;
      border-radius: 7px;
      font-size: 11px;
      align-self: end;
    }
    .row-head-inline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .row-head-inline .checkbox-row {
      margin: 0;
    }

    .row-head-inline .row-action-btn {
      width: auto;
      min-width: var(--row-action-w);
    }

    .class-row .class-remove-btn {
      justify-self: center;
      align-self: center;
    }

    .grid-2 > label,
    .grid-3 > label,
    .speed-variant-row > label,
    .spell-row > label,
    .repeat-inline > label,
    .action-top > label {
      min-width: 0;
      width: 100%;
    }

    .grid-2 > label > input[type="text"],
    .grid-2 > label > select,
    .grid-3 > label > input[type="text"],
    .grid-3 > label > select,
    .identity-size-race > label > input[type="text"],
    .identity-size-race > label > select,
    .speed-variant-row > label > select,
    .spell-row > label > input[type="text"],
    .repeat-inline > label > input[type="text"],
    .repeat-inline > label > select,
    .repeat-inline > label > textarea,
    .action-top > label > input[type="text"],
    .action-top > label > select {
      width: 100%;
    }

    .class-row .num-stepper {
      width: 100%;
      max-width: 90px;

    .checkbox-row {

      align-items: center;
      gap: var(--space-3);

      font-size: 11px;
      font-weight: 600;
      text-transform: none;

    }

    .rt-field {
      border: 1px solid #cfd7e6;
      border-radius: var(--radius-sm);
      min-height: calc(var(--field-h) + var(--space-1));
      padding: 6px var(--field-pad-x);
      font-size: 13px;
      line-height: 1.35;
      background: #fff;
      overflow-wrap: anywhere;
    }

    .btn {
      border: 1px solid #c8d3e4;
      background: #f8fbff;
      color: #20466e;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover { background: #eef5ff; }

    .btn.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn.primary:hover { background: var(--primary-strong); }

    .btn.success {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }

    .btn.success:hover { filter: brightness(0.92); }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    @media (max-width: 920px) {
      .grid-3, .grid-2, .grid-stat, .flag-row, .condition-row, .skill-row, .spell-row, .action-top, .action-head, .class-row, .combat-core, .movement-list-head, .movement-row, .damage-list-head, .damage-row, .condition-list-head, .condition-rule-row, .attr-matrix-head, .attr-matrix-row {
        grid-template-columns: 1fr;
      }
      .row-head-inline { flex-direction: column; align-items: flex-start; }
      .row-head-inline .row-action-btn { width: 100%; }
      .identity-name-wrap, .identity-class-wrap, .identity-size-race { max-width: none; }
      .class-editor { max-width: none; }

      #status {
        text-align: left;
        max-width: none;
        width: 100%;
      }

      .app-header { flex-direction: column; align-items: flex-start; }
      .editor-toolbar { position: static; }
      .editor-main { grid-template-columns: 1fr; }
      .preview-pane { position: static; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="app-header">
      <div class="brand">
        <h1>PPQ NPC Stat Cards</h1>
        <p>Standalone editor that saves to your existing spreadsheet tabs.</p>
      </div>
      <div id="status">Loading NPC list...</div>
    </header>

    <section id="home-view" class="view active">
      <div class="home-wrap">
        <div class="home-top">
          <div>
            <h2 class="home-title">NPC Library</h2>
            <p class="home-subtitle">Pick a tab to edit. Existing spreadsheet and print flow remain unchanged.</p>
          </div>
          <div class="home-controls">
            <input id="search-input" type="text" placeholder="Search tab names...">
            <button id="create-btn" class="btn primary">New NPC</button>
            <button id="refresh-btn" class="btn">Refresh List</button>
          </div>
        </div>
        <div id="npc-grid" class="npc-grid"></div>
      </div>
    </section>

    <section id="editor-view" class="view">
      <div class="editor-wrap">
        <div class="editor-toolbar">
          <button id="back-btn" class="btn">Back To Library</button>
          <div id="editor-title">Editing:</div>
          <button id="print-btn" class="btn">Print This NPC</button>
          <button id="save-btn" class="btn success">Save Changes</button>
        </div>
        <div class="editor-main">
          <div id="editor-form" class="editor-form"></div>
          <aside class="preview-pane">
            <h3 class="preview-title">Live Card Preview</h3>
            <div class="preview-cards">
              <div class="preview-frame">
                <div>
                  <p class="preview-label">Front</p>
                  <div id="preview-front" class="card-preview"></div>
                </div>
              </div>
              <div class="preview-frame">
                <div>
                  <p class="preview-label">Back</p>
                  <div id="preview-back" class="card-preview"></div>
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </div>

  <script>
    var state = {
      npcNames: [],
      filteredNames: [],
      currentSheetName: null,
      rawRows: null,
      parsedData: null,
      dirty: false
    };

    var DAMAGE_FLAG1_OPTIONS = ["", "Resistance", "Vulnerability", "Immunity"];
    var DAMAGE_FLAG2_OPTIONS = ["", "Advantage", "Disadvantage"];
    var CONDITION_FLAG_OPTIONS = ["", "Immunity", "Advantage", "Disadvantage"];
    var DND_SIZE_OPTIONS = ["", "Tiny", "Small", "Medium", "Large", "Huge", "Gargantuan"];
    var DND_CONDITION_OPTIONS = [
      "",
      "Blinded", "Charmed", "Deafened", "Exhaustion", "Frightened", "Grappled",
      "Incapacitated", "Invisible", "Paralyzed", "Petrified", "Poisoned",
      "Prone", "Restrained", "Stunned", "Unconscious"
    ];
    var DAMAGE_TYPE_OPTIONS = [
      "",
      "Acid", "Bludgeoning", "Cold", "Fire", "Force", "Lightning", "Necrotic",
      "Piercing", "Poison", "Psychic", "Radiant", "Slashing", "Thunder",
      "Nonmagical Damage", "Magical Damage"
    ];
    var SKILL_OPTIONS = [
      "", "Acrobatics", "Animal Handling", "Arcana", "Athletics", "Deception", "History",
      "Insight", "Intimidation", "Investigation", "Medicine", "Nature", "Perception",
      "Performance", "Persuasion", "Religion", "Sleight of Hand", "Stealth", "Survival"
    ];
    var SKILL_ABBREV = {
      "Acrobatics": "Acr",
      "Animal Handling": "Ani",
      "Arcana": "Arc",
      "Athletics": "Ath",
      "Deception": "Dec",
      "History": "His",
      "Insight": "Ins",
      "Intimidation": "Inti",
      "Investigation": "Inv",
      "Medicine": "Med",
      "Nature": "Nat",
      "Perception": "Perc",
      "Performance": "Perf",
      "Persuasion": "Pers",
      "Religion": "Rel",
      "Sleight of Hand": "Sle",
      "Stealth": "Ste",
      "Survival": "Sur"
    };
    var ADV_OPTIONS = ["", "Advantage", "Disadvantage"];
    var SIMPLE_KEYS = [
      "name", "class", "size", "race", "ac", "hp", "speed", "climb speed", "swim speed", "fly speed",
      "strength", "strength mod", "strength save", "dexterity", "dexterity mod", "dexterity save",
      "constitution", "constitution mod", "constitution save", "intelligence", "intelligence mod", "intelligence save",
      "wisdom", "wisdom mod", "wisdom save", "charisma", "charisma mod", "charisma save",
      "proficiency bonus", "initiative", "passive perception", "vision"
    ];
    var STATS = ["strength", "dexterity", "constitution", "intelligence", "wisdom", "charisma"];
    var RICH_SIMPLE_KEYS = {};

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      document.getElementById("refresh-btn").addEventListener("click", loadNpcList);
      document.getElementById("create-btn").addEventListener("click", createNewNpc);
      document.getElementById("search-input").addEventListener("input", onSearchChanged);
      document.getElementById("back-btn").addEventListener("click", backToLibrary);
      document.getElementById("save-btn").addEventListener("click", saveNpc);
      document.getElementById("print-btn").addEventListener("click", printCurrentNpc);
      window.addEventListener("beforeunload", function(e) {
        if (!state.dirty) return;
        e.preventDefault();
        e.returnValue = "";
      });
      loadNpcList();
    }

    function setStatus(message, tone) {
      var el = document.getElementById("status");
      el.textContent = message;
      el.className = tone || "";
    }

    function setDirty(flag) {
      state.dirty = !!flag;
      if (!state.currentSheetName) return;
      if (state.dirty) {
        setStatus("Unsaved changes: " + state.currentSheetName, "warn");
      } else {
        setStatus("Loaded: " + state.currentSheetName, "ok");
      }
    }

    function showView(viewId) {
      document.getElementById("home-view").classList.remove("active");
      document.getElementById("editor-view").classList.remove("active");
      document.getElementById(viewId).classList.add("active");
    }

    function loadNpcList() {
      setStatus("Loading NPC list...", "");
      google.script.run
        .withSuccessHandler(function(names) {
          state.npcNames = names || [];
          state.filteredNames = state.npcNames.slice();
          renderNpcGrid();
          setStatus("Loaded " + state.npcNames.length + " NPC tabs.", "ok");
        })
        .withFailureHandler(function(err) {
          setStatus("Failed to load list: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getSheetNames();
    }

    function onSearchChanged() {
      var q = document.getElementById("search-input").value.toLowerCase().trim();
      if (!q) {
        state.filteredNames = state.npcNames.slice();
      } else {
        state.filteredNames = state.npcNames.filter(function(name) {
          return name.toLowerCase().indexOf(q) !== -1;
        });
      }
      renderNpcGrid();
    }

    function renderNpcGrid() {
      var grid = document.getElementById("npc-grid");
      grid.innerHTML = "";

      var createCard = document.createElement("button");
      createCard.className = "npc-card new-card";
      createCard.type = "button";
      createCard.innerHTML = "<h3>+ New NPC</h3><p>Create blank draft tab</p>";
      createCard.addEventListener("click", createNewNpc);
      grid.appendChild(createCard);

      if (!state.filteredNames.length) {
        var empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = state.npcNames.length
          ? "No NPC tabs match your search."
          : "No printable NPC tabs found in this spreadsheet.";
        grid.appendChild(empty);
        return;
      }

      state.filteredNames.forEach(function(sheetName) {
        var button = document.createElement("button");
        button.className = "npc-card";
        button.type = "button";
        button.innerHTML = "<h3>" + escHtml(sheetName) + "</h3><p>Open editor</p>";
        button.addEventListener("click", function() {
          openNpc(sheetName);
        });
        grid.appendChild(button);
      });
    }

    function createNewNpc() {
      if (!confirmDiscardIfDirty()) return;

      var suggested = "New NPC";
      var requestedName = window.prompt("Name for new NPC tab:", suggested);
      if (requestedName === null) return;

      setStatus("Creating blank NPC draft...", "");
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.sheetName) {
            setStatus("Draft creation failed.", "error");
            return;
          }
          setStatus("Created draft: " + result.sheetName, "ok");
          loadNpcList();
          openNpc(result.sheetName);
        })
        .withFailureHandler(function(err) {
          setStatus("Create failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_createBlankNpcSheet(requestedName);
    }

    function confirmDiscardIfDirty() {
      if (!state.dirty) return true;
      return window.confirm("You have unsaved changes. Discard them?");
    }

    function backToLibrary() {
      if (!confirmDiscardIfDirty()) return;
      showView("home-view");
      state.currentSheetName = null;
      state.rawRows = null;
      state.parsedData = null;
      document.getElementById("preview-front").innerHTML = "";
      document.getElementById("preview-back").innerHTML = "";
      setDirty(false);
      setStatus("Back to NPC library.", "");
    }

    function openNpc(sheetName) {
      if (!confirmDiscardIfDirty()) return;
      setStatus("Loading " + sheetName + "...", "");

      google.script.run
        .withSuccessHandler(function(result) {
          if (!result || !result.rows) {
            setStatus("Sheet not found: " + sheetName, "error");
            return;
          }

          state.currentSheetName = sheetName;
          state.rawRows = result.rows;
          state.parsedData = parseRawRows(state.rawRows);
          document.getElementById("editor-title").textContent = "Editing: " + sheetName;
          buildForm(state.parsedData);
          updatePreview();
          setDirty(false);
          showView("editor-view");
        })
        .withFailureHandler(function(err) {
          setStatus("Load failed: " + (err && err.message ? err.message : err), "error");
        })
        .webApp_getRawData(sheetName);
    }

    function parseRawRows(rows) {
      var data = {
        simple: {},
        damage: [],
        conditions: [],
        skills: [],
        actions: [],
        bonusActions: [],
        reactions: [],
        spells: { cantrips: null, levels: [] },
        special: []
      };

      for (var i = 0; i < rows.length; i++) {
        var label = ((rows[i][0] || "") + "").trim();
        if (!label) continue;

        var labelLower = label.toLowerCase();
        var c = rows[i][1] || "";
        var d = rows[i][2] || "";
        var e = rows[i][3] || "";

        if (SIMPLE_KEYS.indexOf(labelLower) !== -1) {
          data.simple[labelLower] = { rowIndex: i, value: c, flag1: d, flag2: e };
          continue;
        }

        if (labelLower === "damage") {
          data.damage.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "conditions") {
          data.conditions.push({ rowIndex: i, value: c, flag1: d, flag2: e });
          continue;
        }

        if (labelLower === "skills") {
          data.skills.push({ rowIndex: i, name: c, modifier: d, flag: e });
          continue;
        }

        if (labelLower === "action") {
          data.actions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "bonus action") {
          data.bonusActions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "reaction") {
          data.reactions.push({ rowIndex: i, cost: c, name: d, description: e });
          continue;
        }

        if (labelLower === "special") {
          data.special.push({ rowIndex: i, text: c, newLine: d });
          continue;
        }

        if (labelLower === "cantrips") {
          data.spells.cantrips = { rowIndex: i, value: c };
          continue;
        }

        var slotMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spell\s+slots$/);
        var spellMatch = labelLower.match(/^(\d+)(?:st|nd|rd|th)\s+level\s+spells$/);

        if (slotMatch) {
          var slotIndex = parseInt(slotMatch[1], 10) - 1;
          data.spells.levels[slotIndex] = data.spells.levels[slotIndex] || {};
          data.spells.levels[slotIndex].slotsRowIndex = i;
          data.spells.levels[slotIndex].slots = c;
          continue;
        }

        if (spellMatch) {
          var spellIndex = parseInt(spellMatch[1], 10) - 1;
          data.spells.levels[spellIndex] = data.spells.levels[spellIndex] || {};
          data.spells.levels[spellIndex].spellsRowIndex = i;
          data.spells.levels[spellIndex].spells = c;
        }
      }

      return data;
    }

    function buildForm(data) {
      var root = document.getElementById("editor-form");
      var html = "";

      html += "<div class='section'><h2>1. Identity</h2>";
      html += "<div class='identity-name-wrap'>" + simpleField("Name", "name", data, false) + "</div>";
      html += "<div class='identity-class-wrap'>" + classEditorHtml(data) + "</div>";
      html += "<div class='grid-2 identity-size-race'>";
      html += simpleField("Size", "size", data, false, { selectOptions: DND_SIZE_OPTIONS });
      html += simpleField("Race / Type", "race", data, false);
      html += "</div></div>";

      html += "<div class='section'><h2>2. Combat Stats</h2>";
      html += "<div class='combat-core'>";
      html += simpleField("AC", "ac", data, false, { type: "number", min: 0, step: 1, defaultValue: 10, stepper: true });
      html += simpleField("HP", "hp", data, false, { type: "number", min: 0, step: 1, defaultValue: 10, stepper: true });
      html += simpleField("Speed", "speed", data, false, { type: "number", min: 0, step: 1, defaultValue: 25, stepper: true });
      html += "</div>";
      html += speedVariantsEditorHtml(data);
      html += "</div>";

      html += "<div class='section'><h2>3. Defenses</h2>";
      html += "<h3>Damage</h3>";
      var damageMeta = getExpandableMeta(data.damage, "damage");
      html += "<div class='defense-subsection'>";
      html += "<div class='defense-list-head damage-list-head'>"
        + "  <div>Type</div>"
        + "  <div>Effect</div>"
        + "  <div>Roll Mod</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list damage-list'>";
      data.damage.forEach(function(row, i) {
        var hiddenClass = damageMeta.visible[i] ? "" : " is-hidden";
        html += "<div class='damage-row row-editor-row expand-row expand-damage" + hiddenClass + "' data-row-index='" + i + "'>";
        html += selectInput("damage-" + i + "-value", DAMAGE_TYPE_OPTIONS, row.value);
        html += selectInput("damage-" + i + "-flag1", DAMAGE_FLAG1_OPTIONS, row.flag1);
        html += selectInput("damage-" + i + "-flag2", DAMAGE_FLAG2_OPTIONS, row.flag2);
        html += repeatRowRemoveButton("damage", i, "damage rule");
        html += "</div>";
      });
      html += "</div>";
      html += renderAddRowButton("damage", "Add Damage Row", damageMeta.hiddenCount, true);
      html += "</div>";
      html += "<h3>Conditions</h3>";
      var conditionMeta = getExpandableMeta(data.conditions, "conditions");
      html += "<div class='defense-subsection'>";
      html += "<div class='defense-list-head condition-list-head'>"
        + "  <div>Condition</div>"
        + "  <div>Effect</div>"
        + "  <div>Remove</div>"
        + "</div>";
      html += "<div class='row-editor-list condition-list'>";
      data.conditions.forEach(function(row, i) {
        var conditionHiddenClass = conditionMeta.visible[i] ? "" : " is-hidden";
        var conditionFlagValue = row.flag1 || row.flag2 || "";
        html += "<div class='condition-rule-row row-editor-row expand-row expand-conditions" + conditionHiddenClass + "' data-row-index='" + i + "'>";
        html += selectInput("cond-" + i + "-value", DND_CONDITION_OPTIONS, row.value);
        html += selectInput("cond-" + i + "-flag", CONDITION_FLAG_OPTIONS, conditionFlagValue);
        html += repeatRowRemoveButton("conditions", i, "condition rule");
        html += "</div>";
      });
      html += "</div>";
      html += renderAddRowButton("conditions", "Add Condition Row", conditionMeta.hiddenCount, true);
      html += "</div>";
      html += "</div>";

      html += "<div class='section'><h2>4. Attributes</h2>";
      html += attributeMatrixHtml(data);
      html += "</div>";

      html += "<div class='section'><h2>5. Skills &amp; Senses</h2>";
      html += "<div class='grid-2'>";
      html += simpleField("Proficiency Bonus", "proficiency bonus", data, false);
      html += simpleField("Initiative", "initiative", data, false);
      html += "</div><div class='grid-2'>";
      html += simpleField("Passive Perception", "passive perception", data, false);
      html += simpleField("Vision", "vision", data, false);
      html += "</div>";

    function classRowHtml(index, entry, allowRemove) {
      var removeBtn = allowRemove
        ? "<button type='button' class='btn class-remove-btn' title='Remove class entry' aria-label='Remove class entry'>&minus;</button>"
        : "<button type='button' class='btn class-remove-btn' style='visibility:hidden' tabindex='-1'>&minus;</button>";

        + "<input type='text' class='class-name-input' aria-label='Class name' placeholder='Class Name' value='" + escAttr((entry && entry.className) || "") + "'>"

    function parseClassEntries(rawClass) {
      var value = (rawClass || "").trim();
      if (!value) return [];

      return value.split("/").map(function(part) {
        var piece = part.trim();
        if (!piece) return null;
        var m = piece.match(/^(.*?)(?:\s+(\d+))?$/);
        if (!m) return { className: piece, level: "" };
        return {
          className: (m[1] || "").trim(),
          level: (m[2] || "").trim()
        };
      }).filter(function(x) { return !!x; });
    }

    function syncClassEditorRows() {
      var rowsWrap = document.getElementById("class-rows");

      var rows = rowsWrap.querySelectorAll(".class-row");

      for (var i = 0; i < rows.length; i++) {
        (function(rowEl) {

    function numberInput(id, value, opts) {
      var options = opts || {};
      var hasMin = options.min !== undefined;
      var minAttr = hasMin ? " min='" + escAttr(String(options.min)) + "'" : "";
      var stepAttr = options.step !== undefined ? " step='" + escAttr(String(options.step)) + "'" : "";
      var raw = ((value === undefined || value === null) ? "" : String(value)).trim();
      var fallback = options.defaultValue !== undefined ? options.defaultValue : (hasMin ? options.min : 0);
      var normalized = "";
      if (options.allowBlank && raw === "") {
        normalized = "";
      } else if (hasMin) {
        normalized = String(normalizeMinInt(raw, fallback, options.min));
      } else {
        var parsed = parseInt(String(raw || "").replace(/[^\d-]/g, ""), 10);
        if (isNaN(parsed)) parsed = fallback;
        normalized = String(parsed);
      }
      var idAttr = id ? " id='" + id + "'" : "";
      var readonlyAttr = options.readonly ? " readonly" : "";
      var disabledAttr = options.disabled ? " disabled" : "";
      var placeholderAttr = options.placeholder ? " placeholder='" + escAttr(String(options.placeholder)) + "'" : "";
      var clearAtMinAttr = options.clearAtMinOnDecrement ? " data-clear-at-min='true'" : "";
      var extraClass = options.extraClass ? (" " + options.extraClass) : "";
      var inputHtml = "<input type='number' class='num-input" + extraClass + "'" + idAttr
        + " value='" + escAttr(normalized) + "'" + minAttr + stepAttr + placeholderAttr + clearAtMinAttr + " inputmode='numeric'" + readonlyAttr + disabledAttr + ">";

      if (!options.stepper) return inputHtml;

      return "<div class='num-stepper' data-target='" + escAttr(id) + "'>"
        + "<button type='button' class='step-btn step-down' aria-label='Decrease'>-</button>"
        + inputHtml
        + "<button type='button' class='step-btn step-up' aria-label='Increase'>+</button>"
        + "</div>";
    }

    function initNumberSteppers(scopeEl) {
      var scope = scopeEl && scopeEl.querySelectorAll ? scopeEl : document;
      var steppers = scope.querySelectorAll(".num-stepper");
      for (var i = 0; i < steppers.length; i++) {
        (function(stepper) {
          if (stepper.getAttribute("data-stepper-bound") === "true") return;
          stepper.setAttribute("data-stepper-bound", "true");
          var input = stepper.querySelector(".num-input");
          var down = stepper.querySelector(".step-down");
          var up = stepper.querySelector(".step-up");
          if (!input || !down || !up) return;

          var holdStartTimer = null;
          var holdRepeatTimer = null;

          function clearHoldTimers() {
            if (holdStartTimer) {
              clearTimeout(holdStartTimer);
              holdStartTimer = null;
            }
            if (holdRepeatTimer) {
              clearInterval(holdRepeatTimer);
              holdRepeatTimer = null;
            }
          }

          function adjust(delta) {
            if (input.disabled || input.readOnly) return;
            var minAttr = input.getAttribute("min");
            var hasMin = minAttr !== null && minAttr !== "";
            var min = hasMin ? parseInt(minAttr, 10) : 0;
            if (isNaN(min)) min = 0;
            var clearAtMin = input.getAttribute("data-clear-at-min") === "true";
            var raw = (input.value || "").trim();
            if (raw === "") {
              if (delta < 0 && clearAtMin) return;
              input.value = String(hasMin ? min : 0);
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var current = parseInt(String(raw).replace(/[^\d-]/g, ""), 10);
            if (isNaN(current)) current = hasMin ? min : 0;
            if (delta < 0 && clearAtMin && hasMin && current === min) {
              input.value = "";
              input.dispatchEvent(new Event("input", { bubbles: true }));
              input.dispatchEvent(new Event("change", { bubbles: true }));
              return;
            }
            var next = current + delta;
            if (hasMin && next < min) next = min;
            input.value = String(next);
            input.dispatchEvent(new Event("input", { bubbles: true }));
            input.dispatchEvent(new Event("change", { bubbles: true }));
          }

          function startHold(delta, ev) {
            if (ev) ev.preventDefault();
            clearHoldTimers();
            adjust(delta);
            holdStartTimer = setTimeout(function() {
              holdRepeatTimer = setInterval(function() { adjust(delta); }, 90);
            }, 320);
          }

          function stopHold() {
            clearHoldTimers();
          }

          down.addEventListener("mousedown", function(e) { startHold(-1, e); });
          up.addEventListener("mousedown", function(e) { startHold(1, e); });
          down.addEventListener("touchstart", function(e) { startHold(-1, e); }, { passive: false });
          up.addEventListener("touchstart", function(e) { startHold(1, e); }, { passive: false });

          down.addEventListener("mouseup", stopHold);
          up.addEventListener("mouseup", stopHold);
          down.addEventListener("mouseleave", stopHold);
          up.addEventListener("mouseleave", stopHold);
          down.addEventListener("touchend", stopHold);
          up.addEventListener("touchend", stopHold);
          down.addEventListener("touchcancel", stopHold);
          up.addEventListener("touchcancel", stopHold);
          document.addEventListener("mouseup", stopHold);
          document.addEventListener("touchend", stopHold);
        })(steppers[i]);
      }
    }

      for (var i = 0; i < typeEls.length; i++) {

        })(typeEls[i]);

    function hasAnyValue(values) {
      for (var i = 0; i < values.length; i++) {
        if (((values[i] || "") + "").trim() !== "") return true;
      }
      return false;
    }

    function isExpandableRowFilled(row, rowType) {
      if (!row) return false;
      if (rowType === "movement") {
        return hasAnyValue([row.type, row.value]);
      }
      if (rowType === "damage" || rowType === "conditions") {
        return hasAnyValue([row.value, row.flag1, row.flag2]);
      }
      if (rowType === "skills") {
        return hasAnyValue([row.name, row.modifier, row.flag]);
      }
      if (rowType === "actions" || rowType === "bonusActions" || rowType === "reactions") {
        return hasAnyValue([row.cost, row.name, row.description]);
      }
      if (rowType === "special") {
        return hasAnyValue([row.text, row.newLine]);
      }
      return false;
    }

    function getExpandableMeta(rows, rowType) {
      var list = rows || [];
      var visible = {};
      if (!list.length) return { visible: visible, hiddenCount: 0 };

      var filledIndexes = [];
      var emptyIndexes = [];
      for (var i = 0; i < list.length; i++) {
        if (isExpandableRowFilled(list[i], rowType)) filledIndexes.push(i);
        else emptyIndexes.push(i);
      }

      var targetVisible = Math.min(list.length, Math.max(1, filledIndexes.length + 1));
      var visibleCount = 0;
      for (var f = 0; f < filledIndexes.length; f++) {
        visible[filledIndexes[f]] = true;
        visibleCount++;
      }
      for (var e = 0; e < emptyIndexes.length && visibleCount < targetVisible; e++) {
        visible[emptyIndexes[e]] = true;
        visibleCount++;
      }

      return { visible: visible, hiddenCount: list.length - visibleCount };
    }
